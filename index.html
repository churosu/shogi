<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>攻城戦 — 三駒勝負</title>
<style>
:root{
  --bg:#15110b;
  --panel:#211a10;
  --panel2:#2a2114;
  --frame:#4a371f;
  --gold:#c9a53f;
  --shu:#c73e2e;
  --ink:#efe6d0;
  --sub:#a89878;
  --cellL:#c2a171;   /* 左陣（茜の木地） */
  --cellL2:#b6935f;
  --cellR:#8e9aac;   /* 右陣（藍鼠の石畳） */
  --cellR2:#7f8c9f;
  --good:#5fae5f;
  --bad:#d2543f;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
  font-family:"Hiragino Mincho ProN","Yu Mincho","Noto Serif JP",serif;
  -webkit-user-select:none;user-select:none}
#app{max-width:560px;margin:0 auto;padding:8px 8px 24px}

header{display:flex;align-items:center;justify-content:space-between;padding:4px 2px 8px}
h1{font-size:22px;margin:0;letter-spacing:.35em;color:var(--gold);font-weight:600;text-shadow:0 0 14px rgba(201,165,63,.25)}
h1 small{font-size:11px;letter-spacing:.15em;color:var(--sub);display:block;margin-top:2px}
#scoreBox{display:flex;gap:8px;align-items:center;font-size:12px}
.scorePill{background:var(--panel);border:1px solid #3a2f1d;border-radius:14px;padding:4px 10px;display:flex;gap:6px;align-items:center}
.scorePill b{font-size:15px;color:var(--gold)}
.scorePill.enemy b{color:var(--shu)}
#helpBtn,#muteBtn{background:var(--panel);color:var(--sub);border:1px solid #3a2f1d;border-radius:50%;width:30px;height:30px;font-size:14px;font-family:inherit}

#phaseBar{background:linear-gradient(90deg,transparent,rgba(201,165,63,.12),transparent);
  border-top:1px solid #3a2f1d;border-bottom:1px solid #3a2f1d;
  text-align:center;padding:7px 4px;font-size:14px;letter-spacing:.12em;min-height:34px}
#phaseBar .turnP{color:var(--gold)} #phaseBar .turnE{color:#e0705e}

#boardWrap{display:flex;justify-content:center;padding:12px 0 8px;position:relative}
#board{
  display:grid;grid-template-columns:repeat(6,1fr);
  width:min(94vw,480px);aspect-ratio:1;
  border:6px solid #1c1409;outline:1px solid var(--gold);
  box-shadow:0 8px 30px rgba(0,0,0,.6),inset 0 0 24px rgba(0,0,0,.45);
  background:#000}
.cell{position:relative;border:1px solid rgba(20,12,4,.55)}
.cell.L{background:linear-gradient(135deg,var(--cellL),var(--cellL2))}
.cell.R{background:linear-gradient(135deg,var(--cellR),var(--cellR2))}
.cell.homeP::after,.cell.homeE::after{content:"";position:absolute;inset:0;box-shadow:inset 0 0 0 1px rgba(201,165,63,.25);pointer-events:none}

.cell .hl{position:absolute;inset:0;pointer-events:none;z-index:3}
.cell.hl-move .hl{box-shadow:inset 0 0 0 3px rgba(110,200,110,.95);background:rgba(110,200,110,.22);animation:pulse 1.1s infinite}
.cell.hl-jump .hl{box-shadow:inset 0 0 0 3px rgba(110,180,230,.95);background:rgba(110,180,230,.25);animation:pulse 1.1s infinite}
.cell.hl-atk .hl{box-shadow:inset 0 0 0 3px rgba(220,70,50,.95);background:rgba(220,70,50,.25);animation:pulse .9s infinite}
.cell.hl-tgt .hl{box-shadow:inset 0 0 0 3px rgba(231,196,87,.95);background:rgba(231,196,87,.28);animation:pulse 1.1s infinite}
.cell.hl-sel .hl{box-shadow:inset 0 0 0 3px #fff;}
@keyframes pulse{0%,100%{opacity:.95}50%{opacity:.45}}

.marker{position:absolute;z-index:2;pointer-events:none;font-size:13px}
.mk-trap{left:2px;top:1px;color:#7a2c14;text-shadow:0 0 2px #fff}
.mk-bomb{right:2px;top:1px}
.mk-block{left:50%;top:50%;transform:translate(-50%,-50%);font-size:20px;color:rgba(40,60,150,.8)}

.piece{position:absolute;left:7%;top:6%;width:86%;height:88%;z-index:4;
  clip-path:polygon(50% 0%,96% 28%,84% 100%,16% 100%,4% 28%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-weight:700;cursor:pointer;
  transition:transform .15s}
.piece.P{background:linear-gradient(180deg,#f4e3bd,#d9b87c 60%,#bb9354);color:#241404;
  box-shadow:inset 0 -3px 0 rgba(0,0,0,.3)}
.piece.E{background:linear-gradient(180deg,#5a2a23,#3c1a14 60%,#2a100b);color:#f3d9a8;
  transform:rotate(180deg);box-shadow:inset 0 -3px 0 rgba(0,0,0,.5)}
.piece .kj{font-size:clamp(15px,5.2vw,24px);line-height:1}
.piece .hpRow{display:flex;gap:1px;margin-top:2px}
.piece .hpRow i{width:5px;height:5px;border-radius:1px;background:#3f7d3f;display:block}
.piece.E .hpRow i{background:#d98a4a}
.piece .hpRow i.half{opacity:.55;transform:scaleY(.5)}
.piece .apRow{position:absolute;bottom:1px;display:flex;gap:2px}
.piece .apRow i{width:4px;height:4px;border-radius:50%;background:#1d4ed8;display:block}
.piece.E .apRow i{background:#93c5fd}
.piece .badges{position:absolute;top:0;right:2%;display:flex;flex-direction:column;font-size:9px;line-height:1.15}
.piece.E .badges{transform:none}
.piece.invis{opacity:.45;filter:saturate(.4)}
.piece.actorNow{outline:2px solid #fff;outline-offset:-2px}
.piece.flash{animation:hitflash .6s}
@keyframes hitflash{
  0%,40%{filter:brightness(1.9) sepia(1) saturate(14) hue-rotate(-38deg) drop-shadow(0 0 9px #ff2a1a)}
  20%,60%{filter:none}
  80%{filter:brightness(1.7) sepia(1) saturate(12) hue-rotate(-38deg) drop-shadow(0 0 7px #ff2a1a)}
  100%{filter:none}}
.piece.spawn{animation:spawn .3s}
@keyframes spawn{0%{transform:scale(.2)}100%{transform:scale(1)}}
.piece.E.spawn{animation:spawnE .3s}
@keyframes spawnE{0%{transform:rotate(180deg) scale(.2)}100%{transform:rotate(180deg) scale(1)}}

#peekBack{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:60;
  box-shadow:0 4px 20px rgba(0,0,0,.7);animation:pulse 1.4s infinite}

#ctrl{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:4px 0 8px;min-height:44px}
button.act{font-family:inherit;font-size:14px;letter-spacing:.08em;
  background:linear-gradient(180deg,#3a2d18,#2a2012);color:var(--ink);
  border:1px solid #5b4827;border-radius:8px;padding:9px 14px;cursor:pointer}
button.act:disabled{opacity:.35}
button.act.primary{border-color:var(--gold);color:#ffe9b0;box-shadow:0 0 10px rgba(201,165,63,.18)}
button.act.danger{border-color:var(--shu);color:#ffb9a8}

#infoPanel{background:var(--panel);border:1px solid #3a2f1d;border-radius:10px;
  padding:10px 12px;margin:4px 0;font-size:13px;min-height:50px;line-height:1.6}
#infoPanel .pname{font-size:16px;color:var(--gold);letter-spacing:.1em}
#infoPanel .stat{color:var(--sub);font-size:12px;margin-left:8px}
#infoPanel .desc{margin-top:4px;color:#d9cdb2}
#infoPanel .abilBtns{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
#infoPanel .abilBtns button{font-size:12.5px;padding:7px 11px}

#logPanel{background:var(--panel);border:1px solid #3a2f1d;border-radius:10px;margin-top:8px}
#logHead{padding:6px 12px;font-size:12px;color:var(--sub);letter-spacing:.2em;border-bottom:1px solid #3a2f1d}
#log{max-height:130px;overflow-y:auto;padding:8px 12px;font-size:12.5px;line-height:1.7}
#log .lp{color:#e7d8ae} #log .le{color:#e59a86} #log .ls{color:#9aa6b5}

/* modal */
#modalBack{position:fixed;inset:0;background:rgba(8,5,2,.78);display:flex;align-items:center;justify-content:center;z-index:50;padding:14px}
#modalBack.hidden{display:none}
#modal{background:linear-gradient(180deg,#272014,#1c150c);border:1px solid var(--gold);
  border-radius:12px;max-width:520px;width:100%;max-height:86vh;display:flex;flex-direction:column;
  box-shadow:0 10px 50px rgba(0,0,0,.8)}
#modalTitle{padding:14px 16px 8px;font-size:17px;letter-spacing:.2em;color:var(--gold);text-align:center}
#modalBody{padding:6px 14px;overflow-y:auto;font-size:13.5px;line-height:1.7}
#modalBtns{display:flex;gap:8px;justify-content:center;padding:12px;flex-wrap:wrap}

.pickGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:7px}
.pCard{background:var(--panel2);border:1px solid #4a3a20;border-radius:8px;padding:8px 9px;cursor:pointer}
.pCard:active{background:#3a2e1a}
.pCard .t{display:flex;justify-content:space-between;align-items:baseline}
.pCard .nm{font-size:14.5px;color:#f0dfb4}
.pCard .ap{font-size:11px;color:#8fb8e8}
.pCard .d{font-size:10.5px;color:var(--sub);margin-top:3px;line-height:1.45}

.choiceList{display:flex;flex-direction:column;gap:8px;padding:4px 0}
.choiceList button{text-align:left}

.ruleSec{margin-bottom:10px}
.ruleSec h3{color:var(--gold);font-size:14px;margin:10px 0 4px;letter-spacing:.15em}
.ruleSec p,.ruleSec li{color:#d9cdb2;font-size:12.5px}
.ruleSec table{width:100%;border-collapse:collapse;font-size:11.5px}
.ruleSec td,.ruleSec th{border:1px solid #3a2f1d;padding:4px 6px;text-align:left;vertical-align:top}
.ruleSec th{color:var(--gold);white-space:nowrap}

#overBanner{font-size:30px;letter-spacing:.4em;text-align:center;padding:10px 0;color:var(--gold)}
#overBanner.lose{color:var(--shu)}
.zoneLabel{display:flex;justify-content:space-between;width:min(94vw,480px);margin:0 auto;font-size:10px;color:var(--sub);letter-spacing:.3em;padding:0 4px}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>攻城戦<small>— 三駒勝負 —</small></h1>
    <div id="scoreBox">
      <div class="scorePill">自軍 <b id="scoreP">0</b>/2</div>
      <div class="scorePill enemy">敵軍 <b id="scoreE">0</b>/2</div>
      <button id="muteBtn" title="効果音">♪</button>
      <button id="helpBtn" title="ルール">？</button>
    </div>
  </header>
  <div id="phaseBar">…</div>
  <div id="boardWrap"><div id="board"></div></div>
  <div class="zoneLabel"><span>◀ 左陣</span><span>右陣 ▶</span></div>
  <div id="ctrl"></div>
  <div id="infoPanel">駒を選択すると詳細が表示されます。</div>
  <div id="logPanel"><div id="logHead">戦 況 記 録</div><div id="log"></div></div>
</div>

<div id="modalBack" class="hidden">
  <div id="modal">
    <div id="modalTitle"></div>
    <div id="modalBody"></div>
    <div id="modalBtns"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
<script>
"use strict";
/* =========================================================
   攻城戦 — 三駒勝負  (6x6 / 3駒 / 2撃破先取)
   ========================================================= */

const PIECES = {
  kenshi:    {name:"剣士",  k:"剣", ap:1, desc:"この駒の攻撃ダメージ+0.5"},
  kyuhei:    {name:"弓兵",  k:"弓", ap:1, noNormal:true, desc:"行動力1：縦横2マス・斜め1マスの範囲に遠距離攻撃。通常攻撃不可"},
  tatehei:   {name:"盾兵",  k:"盾", ap:1, desc:"攻撃フェーズ後、隣接1マスを指定。そのマスからの攻撃を受けない"},
  kiba:      {name:"騎馬",  k:"馬", ap:2, desc:"斜め移動可。行動力2を消費して駒を1つ飛び越えられる"},
  senshi:    {name:"戦士",  k:"戦", ap:1, desc:"体力2以下で与ダメ+1、体力1以下で与ダメ+2"},
  jutsushi:  {name:"術士",  k:"術", ap:1, desc:"行動力1：敵1体の次ターンの行動力-1"},
  wanashi:   {name:"罠師",  k:"罠", ap:1, desc:"行動力1：周囲8マスに罠を設置（最大2）。罠＝1ダメ＋行動力-1。自分のみ視認可"},
  ninja:     {name:"忍者",  k:"忍", ap:2, desc:"行動力1：相手手番終了まで透明化。透明マスに来た敵に3ダメ。透明中は斜め移動可・爆発以外の攻撃無効・通常攻撃不可"},
  kusushi:   {name:"薬師",  k:"薬", ap:1, desc:"行動力1：隣接駒のHPを±1（味方+1／敵-1。ゲーム中1回のみ）"},
  chokyo:    {name:"調教師",k:"調", ap:1, noNormal:true, desc:"行動力1：HP1の獣を隣に召喚し、以後操作できる。獣死亡で自分HP-0.5。通常攻撃不可"},
  gunshi:    {name:"軍師",  k:"軍", ap:1, desc:"行動力1＋HP0.5：このターン、駒を2体行動させられる"},
  souhei:    {name:"槍兵",  k:"槍", ap:1, desc:"通常攻撃の範囲が「斜め4マス＋正面1マス」になる"},
  fushicho:  {name:"不死鳥",k:"鳳", ap:1, desc:"死亡時、1度だけ失点を与えずHP0.5でその場に復活"},
  jusoshi:   {name:"呪詛師",k:"呪", ap:1, desc:"HP1.5を消費：敵全体のHP-0.5（行動力消費なし）"},
  miko:      {name:"巫女",  k:"巫", ap:1, desc:"行動力1＋HP0.5：味方1体の行動力+1。さらにその駒も行動できる"},
  esper:     {name:"超能力者",k:"超", ap:1, desc:"召喚時に縦横／斜めモードを選択。射程2マス内の駒（敵味方問わず）を1マス動かす（行動力1）"},
  boken:     {name:"冒険者",k:"冒", ap:2, desc:"左右の端を行き来できる"},
  kyuketsuki:{name:"吸血鬼",k:"吸", ap:1, desc:"通常攻撃でダメージを与えるたび、HPを0.5回復する"},
  sogeki:    {name:"狙撃手",k:"狙", ap:1, noNormal:true, desc:"行動力1：斜め3マスまでの遠距離攻撃。通常攻撃不可"},
  seishoku:  {name:"聖職者",k:"聖", ap:1, desc:"死亡時、味方全てに1ダメージ。1度だけ行動力1で味方全体のHP+0.5"},
  majo:      {name:"魔女",  k:"魔", ap:1, desc:"行動力1：味方同士、または敵同士の位置を入れ替える"},
  bakudan:   {name:"爆弾魔",k:"爆", ap:1, noNormal:true, desc:"行動力1：隣接マスに爆弾設置。次の自分手番終了時に爆発し周囲8マスへ1ダメ。通常攻撃不可"},
  yusha:     {name:"勇者",  k:"勇", ap:1, desc:"召喚時、敵1体を密かに「魔王」に指定。魔王が場を去ると近接攻撃3・HP1回復"},
  akuryo:    {name:"悪霊",  k:"霊", ap:1, desc:"行動力1：敵1体は次の手番、通常攻撃ができない"},
  kemono:    {name:"獣",    k:"獣", ap:1, beast:true, desc:"調教師の効果でのみ召喚される（HP1）"},
};
const PICKABLE = Object.keys(PIECES).filter(t=>t!=="kemono");
const ORTHO=[[1,0],[-1,0],[0,1],[0,-1]];
const DIAG=[[1,1],[1,-1],[-1,1],[-1,-1]];
const ALL8=[...ORTHO,...DIAG];

/* ---------- state ---------- */
let G=null;          // game state
let UI={mode:"idle",sel:null,targets:new Set(),ability:null,extra:{}};
let aiLevel="hard";
let soundOn=true;
let pid=1;
const $=s=>document.querySelector(s);

function newGame(){
  G={
    pieces:[], traps:[], bombs:[], kills:{P:0,E:0},
    phase:"setup", turn:"P",
    setupCount:{P:0,E:0},
    slotsLeft:1, currentActor:null, attackUsed:false,
    respawnQueue:[], over:false,
    aiTypes:aiPickComposition(),
  };
  UI={mode:"idle",sel:null,targets:new Set(),ability:null,extra:{}};
  pid=1;
  $("#log").innerHTML="";
  log("―― 開戦。先手はあなたです ――","s");
  beginSetupStep();
  render();
}

/* ---------- helpers ---------- */
const inB=(r,c)=>r>=0&&r<6&&c>=0&&c<6;
const half=c=>c<3?0:1;
const opp=o=>o==="P"?"E":"P";
const r2=v=>Math.round(v*2)/2;
const byId=id=>G.pieces.find(p=>p.id===id&&!p.dead);
const alive=o=>G.pieces.filter(p=>!p.dead&&p.owner===o);
const mains=o=>alive(o).filter(p=>p.type!=="kemono");
const at=(r,c)=>G.pieces.find(p=>!p.dead&&p.r===r&&p.c===c);
function visAt(r,c,forOwner){ // 駒があるか（forOwnerの視点。敵の透明忍者は見えない）
  const p=at(r,c);
  if(!p) return null;
  if(p.flags.invisible && p.owner!==forOwner) return null;
  return p;
}
function frontDr(owner){return owner==="P"?-1:1;}
function colorOk(owner, moveId, nr, nc){
  // moveId の駒が (nr,nc) に居ると仮定して、主力3駒が同色陣に揃わないか
  const ms=mains(owner);
  if(ms.length<3) return true;
  let h=null,same=true;
  for(const p of ms){
    const c=(p.id===moveId)?nc:p.c;
    if(h===null)h=half(c); else if(half(c)!==h){same=false;break;}
  }
  return !same;
}
function log(msg,cls,priv){
  if(typeof NET!=="undefined"&&NET.on&&!NET.applying&&!priv)NET.logBuf.push({m:msg,c:cls||"s"});
  const d=document.createElement("div");
  d.className=cls==="p"?"lp":cls==="e"?"le":"ls";
  d.textContent=msg;
  const L=$("#log"); L.appendChild(d); L.scrollTop=L.scrollHeight;
}
function fmt(v){return Number.isInteger(v)?String(v):v.toFixed(1);}
function pieceLabel(p){return (p.owner==="P"?"自軍":"敵軍")+PIECES[p.type].name;}

/* ---------- sound ---------- */
let AC=null;
function ensureAC(){
  AC=AC||new (window.AudioContext||window.webkitAudioContext)();
  if(AC.state==="suspended")AC.resume();
  return AC;
}
// 最初のタップ／クリックでオーディオを解放（モバイル対策）
["pointerdown","touchstart","keydown"].forEach(ev=>
  document.addEventListener(ev,()=>{try{ensureAC();}catch(e){}},{once:true,passive:true}));
function sfx(kind){
  if(typeof NET!=="undefined"&&NET.on&&!NET.applying&&NET_SFX.has(kind))NET.sfxBuf.push(kind);
  if(!soundOn) return;
  try{
    ensureAC();
    const t=AC.currentTime, o=AC.createOscillator(), g=AC.createGain();
    o.connect(g); g.connect(AC.destination);
    const cfg={
      move:[520,.05,"square",.06], pick:[760,.06,"triangle",.08],
      hit:[170,.14,"sawtooth",.16], heal:[880,.18,"sine",.1],
      death:[90,.45,"sawtooth",.22], place:[440,.09,"triangle",.1],
      win:[660,.5,"triangle",.18], lose:[140,.7,"sawtooth",.18],
      bomb:[60,.5,"square",.25], trap:[300,.2,"square",.15],
    }[kind]||[440,.08,"sine",.08];
    o.type=cfg[2]; o.frequency.setValueAtTime(cfg[0],t);
    if(kind==="death"||kind==="lose"||kind==="bomb") o.frequency.exponentialRampToValueAtTime(40,t+cfg[1]);
    if(kind==="win") o.frequency.setValueAtTime(990,t+.18);
    g.gain.setValueAtTime(cfg[3],t);
    g.gain.exponentialRampToValueAtTime(.0001,t+cfg[1]);
    o.start(t); o.stop(t+cfg[1]+.02);
  }catch(e){}
}

/* ---------- piece creation ---------- */
function makePiece(type,owner,r,c){
  return {id:pid++,type,owner,r,c,hp:type==="kemono"?1:3,
    ap:PIECES[type].ap,maxAp:PIECES[type].ap,dead:false,
    flags:{},spawn:true};
}

/* =========================================================
   オンライン対戦（PeerJS / ルームコード方式）
   ・各クライアントは常に自分を"P"として扱い、送受信時に
     盤面を上下反転＆所有者を入れ替えて同期する
   ========================================================= */
let NET={on:false,first:false,peer:null,conn:null,cont:null,lock:false,
         applying:false,logBuf:[],sfxBuf:[],overShown:false,sentOver:false};
const NET_SFX=new Set(["hit","heal","death","place","bomb","trap","move","win","lose"]);
const CODE_CHARS="ABCDEFGHJKMNPQRSTUVWXYZ23456789";
function genCode(){let s="";for(let i=0;i<4;i++)s+=CODE_CHARS[Math.floor(Math.random()*CODE_CHARS.length)];return s;}

function cleanupNet(){
  try{if(NET.peer)NET.peer.destroy();}catch(e){}
  NET={on:false,first:false,peer:null,conn:null,cont:null,lock:false,
       applying:false,logBuf:[],sfxBuf:[],overShown:false,sentOver:false};
}
function netSerialize(){
  return {
    pieces:G.pieces.map(p=>({id:p.id,type:p.type,owner:p.owner,r:p.r,c:p.c,
      hp:p.hp,ap:p.ap,maxAp:p.maxAp,dead:p.dead,flags:p.flags})),
    traps:G.traps,bombs:G.bombs,kills:G.kills,setupCount:G.setupCount,
    phase:G.phase,turn:G.turn,nphase:G.nphase,
    respawnQueue:G.respawnQueue,over:G.over
  };
}
function applyState(S){
  const seen=new Set();
  for(const sp of S.pieces){
    const fl={...sp.flags};
    if(fl.block)fl.block={r:5-sp.flags.block.r,c:sp.flags.block.c};
    let p=G.pieces.find(x=>x.id===sp.id);
    const isNew=!p;
    if(!p){p={flash:false,spawn:true};G.pieces.push(p);}
    Object.assign(p,{id:sp.id,type:sp.type,owner:opp(sp.owner),r:5-sp.r,c:sp.c,
      hp:sp.hp,ap:sp.ap,maxAp:sp.maxAp,dead:sp.dead,flags:fl});
    if(isNew&&p.dead)p.spawn=false;
    seen.add(sp.id);
  }
  G.pieces=G.pieces.filter(p=>seen.has(p.id));
  G.traps=S.traps.map(t=>({owner:opp(t.owner),r:5-t.r,c:t.c}));
  G.bombs=S.bombs.map(b=>({owner:opp(b.owner),r:5-b.r,c:b.c,fuse:b.fuse}));
  G.kills={P:S.kills.E,E:S.kills.P};
  G.setupCount={P:S.setupCount.E,E:S.setupCount.P};
  G.phase=S.phase;G.turn=opp(S.turn);G.nphase=S.nphase;
  G.respawnQueue=S.respawnQueue.map(o=>opp(o));
  G.over=S.over;
  for(const p of G.pieces)pid=Math.max(pid,p.id+1);
  updateScore();
}
function netSend(kind){
  if(!NET.conn||!NET.conn.open)return;
  const msg={t:kind,S:netSerialize(),logs:NET.logBuf,sfx:NET.sfxBuf};
  NET.logBuf=[];NET.sfxBuf=[];
  try{NET.conn.send(msg);}catch(e){}
}
function flushNetLogs(arr){
  if(!arr)return;
  for(const e of arr){
    const m=e.m.replace(/自軍/g,"\u0001").replace(/敵軍/g,"自軍").replace(/\u0001/g,"敵軍");
    const c=e.c==="p"?"e":e.c==="e"?"p":"s";
    log(m,c);
  }
}
function playNetSfx(arr){
  if(!arr)return;
  for(const k of arr.slice(0,5))sfx(k==="win"?"lose":k==="lose"?"win":k);
}
function waitBar(msg){
  UI={mode:"watch",sel:null,targets:new Set(),ability:null,extra:{}};
  setPhaseBar(`<span class="turnE">${msg}</span>`);
  render();
}
function myTurnToPlace(){
  return NET.first? G.setupCount.P<=G.setupCount.E : G.setupCount.P<G.setupCount.E;
}
function doMaouNet(next){
  const heroes=alive("P").filter(p=>p.type==="yusha"&&!p.flags.maouId&&!p.flags.heroBoost);
  const done=()=>{
    G.nphase=next;
    if(next==="battle")G.turn=NET.first?"P":"E";
    netSend("go");netDispatch();
  };
  if(heroes.length===0){done();return;}
  promptMaou(heroes,0,done);
}
function netDispatch(){
  if(!NET.on)return;
  if(G.over){
    if(!NET.overShown){NET.overShown=true;endGame(G.kills.P>=2?"P":"E");}
    return;
  }
  if(G.nphase==="setup"){beginSetupStep();return;}
  if(G.nphase==="maou1"){ if(NET.first)doMaouNet("maou2"); else waitBar("相手が準備中…"); return;}
  if(G.nphase==="maou2"){ if(!NET.first)doMaouNet("battle"); else waitBar("相手が準備中…"); return;}
  if(G.nphase==="battle"){
    if(G.turn==="P")startPlayerTurn();
    else waitBar("相手の手番…");
  }
}
function netOnData(msg){
  if(!msg)return;
  if(msg.t==="start"){
    NET.on=true;closeModal();
    newNetGame(!!msg.youFirst);
    return;
  }
  if(msg.S){
    NET.applying=true;
    applyState(msg.S);
    flushNetLogs(msg.logs);
    playNetSfx(msg.sfx);
    render();
    NET.applying=false;
  }
  if(msg.t==="go"){netDispatch();return;}
  if(msg.t==="respawn"){
    // 自分の駒が倒された：召喚して制御を返す
    processRespawns(()=>{
      netSend("resume");
      if(!G.over)waitBar("相手の手番…");
    });
    return;
  }
  if(msg.t==="resume"){
    NET.lock=false;
    const c=NET.cont;NET.cont=null;
    if(c)processRespawns(c); // 残りの再召喚キューがあれば続けて処理
    return;
  }
  // msg.t==="watch"：状態反映のみ（観戦表示の更新）
}
function wireConn(conn){
  conn.on("data",netOnData);
  conn.on("close",()=>netClosed());
  conn.on("error",e=>netError(e));
}
function netClosed(){
  if(NET.on&&!G.over){
    openModal("通信切断","<p style='text-align:center'>相手との接続が切れました。</p>",
      [{label:"タイトルへ",cls:"primary",fn:()=>{closeModal();showStart();}}]);
  }
  NET.on=false;
}
function netError(err){
  const t=(err&&err.type)||"不明なエラー";
  cleanupNet();
  openModal("通信エラー",
    `<p style="text-align:center">接続できませんでした（${t}）。<br>ルームコードと通信状況を確認して、もう一度お試しください。</p>`,
    [{label:"戻る",cls:"primary",fn:()=>{closeModal();showStart();}}]);
}
function hostRoom(){
  if(typeof Peer==="undefined"){netError({type:"オフライン：通信ライブラリ未読込"});return;}
  cleanupNet();
  const code=genCode();
  const peer=new Peer("kojosen-v1-"+code);
  NET.peer=peer;
  openModal("ルーム作成",
    `<p style="text-align:center;color:var(--sub)">ルームコード</p>
     <div style="font-size:36px;text-align:center;letter-spacing:.35em;color:var(--gold);font-weight:bold">${code}</div>
     <p style="text-align:center;color:var(--sub);font-size:13px;margin-top:10px">相手にこのコードを伝えて、<br>「ルームに参加」から入力してもらってください。</p>
     <p id="netStat" style="text-align:center;color:var(--shu)">サーバーに接続中…</p>`,
    [{label:"やめる",fn:()=>{closeModal();showStart();}}]);
  peer.on("open",()=>{const s=$("#netStat");if(s)s.textContent="相手の参加を待っています…";});
  peer.on("error",e=>{
    if(e&&e.type==="unavailable-id"){hostRoom();return;}
    netError(e);
  });
  peer.on("connection",conn=>{
    if(NET.conn){try{conn.close();}catch(e){} return;} // 2人目以降は拒否
    NET.conn=conn;
    wireConn(conn);
    conn.on("open",()=>{
      NET.on=true;
      const hostFirst=Math.random()<0.5;
      try{conn.send({t:"start",youFirst:!hostFirst});}catch(e){}
      closeModal();

function joinRoom(){
  if(typeof Peer==="undefined"){netError({type:"オフライン：通信ライブラリ未読込"});return;}
  openModal("ルームに参加",
    `<p style="text-align:center;color:var(--sub)">相手から聞いたルームコードを入力</p>
     <div style="text-align:center;margin:10px 0">
       <input id="roomCodeIn" maxlength="4" autocapitalize="characters" autocomplete="off"

     </div>
     <p id="netStat" style="text-align:center;color:var(--sub);font-size:13px"></p>`,
    [{label:"戻る",fn:()=>{closeModal();showStart();}},
     {label:"参加する",cls:"primary",fn:()=>{
       const code=($("#roomCodeIn").value||"").trim().toUpperCase();

       });

     }}]);

}
function newNetGame(first){

let watchTimer=null;
function scheduleWatch(){
  if(!NET.on||NET.applying||NET.lock||G.over)return;

function beginSetupStep(){
  if(NET.on){
    if(G.setupCount.P>=3&&G.setupCount.E>=3){G.nphase="maou1";netDispatch();return;}
    if(myTurnToPlace()){
      openPiecePicker(`配置 ${G.setupCount.P+1}/3 — 駒を選択`,(type)=>{

        for(let c=0;c<6;c++){

          if(G.setupCount.P===2 && !colorOkPlacement("P",c))continue;

        }

      });

  if(G.setupCount.P<=G.setupCount.E){

      UI={mode:"setup-place",sel:null,targets:new Set(),ability:null,extra:{type}};
      const cells=[];
      for(let c=0;c<6;c++){

/* =========================================================
   ダメージ / 死亡 / リスポーン
   ========================================================= */
const BYPASS=new Set(["bomb","curse","chain","trap","ninja"]);
function dealDamage(target,dmg,src,kind){
  if(!target||target.dead) return false;
  if(target.flags.invisible && !BYPASS.has(kind)){
    log(`${pieceLabel(target)}は透明で攻撃を無効化！`,target.owner==="P"?"p":"e");
    return false;
  }
  if(target.flags.block && src && (kind==="melee"||kind==="ranged")
     && src.r===target.flags.block.r && src.c===target.flags.block.c){
    log(`${pieceLabel(target)}は盾でそのマスからの攻撃を防いだ！`,target.owner==="P"?"p":"e");
    return false;
  }
  target.hp=r2(target.hp-dmg);
  target.flash=true;
  sfx(kind==="heal"?"heal":"hit");
  log(`${pieceLabel(target)}に${fmt(dmg)}ダメージ（残HP ${fmt(Math.max(0,target.hp))}）`,src&&src.owner==="P"?"p":"e");
  if(src && src.type==="kyuketsuki" && src.owner!==target.owner && !src.dead && kind==="melee" && src.hp<3){
    healPiece(src,0.5);
  }
  if(target.hp<=0){ killPiece(target,src,kind); }
  return true;
}
function healPiece(p,amount){
  if(!p||p.dead)return;
  p.hp=Math.min(3,r2(p.hp+amount));
  sfx("heal");
  log(`${pieceLabel(p)}のHPが${fmt(amount)}回復（HP ${fmt(p.hp)}）`,p.owner==="P"?"p":"e");
}
function killPiece(p,src,kind){
  if(p.type==="fushicho" && !p.flags.phoenix){
    p.flags.phoenix=true; p.hp=0.5;
    log(`${pieceLabel(p)}は灰から蘇った！（HP0.5・失点なし）`,p.owner==="P"?"p":"e");
    return;
  }
  p.dead=true;
  sfx("death");
  log(`◆ ${pieceLabel(p)}は倒れた！`,p.owner==="P"?"e":"p");
  // 魔王チェック
  for(const h of G.pieces){
    if(!h.dead && h.type==="yusha" && h.flags.maouId===p.id && !h.flags.heroBoost){
      h.flags.heroBoost=true;
      healPiece(h,1);
      log(`★ 魔王が場を去った！${pieceLabel(h)}が覚醒（近接攻撃3）`,h.owner==="P"?"p":"e");
    }
  }
  // 聖職者の道連れ
  if(p.type==="seishoku"){
    log(`${pieceLabel(p)}の殉教…味方全てに1ダメージ`,"s");
    for(const o of alive(p.owner)) dealDamage(o,1,null,"chain");
  }
  if(p.type==="kemono"){
    const t=byId(p.flags.beastOf);
    if(t){ log("獣の死により調教師が傷ついた","s"); dealDamage(t,0.5,null,"chain"); }
    return; // 失点・再召喚なし
  }
  const scorer=opp(p.owner);
  G.kills[scorer]++;
  updateScore();
  if(G.kills[scorer]>=2){ endGame(scorer); return; }
  G.respawnQueue.push(p.owner);
}
function updateScore(){
  $("#scoreP").textContent=G.kills.P;
  $("#scoreE").textContent=G.kills.E;
}
function endGame(winner){
  G.over=true;
  if(NET.on){
    NET.overShown=true;
    if(!NET.applying&&!NET.sentOver){NET.sentOver=true;netSend("go");}
  }
  UI={mode:"over",sel:null,targets:new Set(),ability:null,extra:{}};
  sfx(winner==="P"?"win":"lose");
  setPhaseBar(winner==="P"?'<span class="turnP">勝利！</span>':'<span class="turnE">敗北…</span>');
  render();
  setTimeout(()=>{
    openModal("勝敗決す",
      `<div id="overBanner" class="${winner==="P"?"":"lose"}">${winner==="P"?"勝 利":"敗 北"}</div>
       <p style="text-align:center;color:var(--sub)">自軍 ${G.kills.P} — ${G.kills.E} 敵軍</p>`,
      [{label:"もう一度戦う",cls:"primary",fn:()=>{closeModal();showStart();}}]);
  },600);
}

/* ---- respawn ---- */
function processRespawns(cont){
  if(G.over)return;
  if(G.respawnQueue.length===0){cont();return;}
  if(NET.on&&G.respawnQueue[0]==="E"){
    // 相手の駒の再召喚：相手側に委譲して結果を待つ
    NET.cont=cont;NET.lock=true;
    netSend("respawn");
    waitBar("相手が駒を召喚中…");
    return;
  }
  const owner=G.respawnQueue.shift();
  if(owner==="E"){
    aiRespawn();
    render();
    setTimeout(()=>processRespawns(cont),400);
  }else{
    openPiecePicker("駒が倒された — 新たな駒を召喚",(type)=>{
      UI={mode:"respawn-place",sel:null,targets:new Set(),ability:null,extra:{type,cont}};
      const cells=[];
      for(let c=0;c<6;c++){
        if(at(5,c))continue;
        if(mains("P").length>=2 && !respawnColorOk("P",c))continue;
        cells.push("5,"+c);
      }
      if(cells.length===0){for(let c=0;c<6;c++)if(!at(5,c))cells.push("5,"+c);}
      UI.targets=new Set(cells);
      setPhaseBar('<span class="turnP">召喚するマスを選択（手前の段）</span>');
      render();
    });
  }
}
function respawnColorOk(owner,c){
  const ms=mains(owner);
  if(ms.length<2)return true;
  return !(ms.every(p=>half(p.c)===half(c)));
}
function placeRespawn(r,c){
  const {type,cont}=UI.extra;
  const p=makePiece(type,"P",r,c);
  G.pieces.push(p);
  sfx("place");
  log(`自軍：${PIECES[type].name}を召喚`,"p");
  UI={mode:"idle",sel:null,targets:new Set(),ability:null,extra:{}};
  const after=()=>{
    render();
    if(type==="yusha" && !p.flags.maouId){
      promptMaou([p],0,()=>processRespawns(cont));
    }else processRespawns(cont);
  };
  if(type==="esper") askEsperMode(p,after); else after();
}
function aiRespawn(){
  const type=aiPickRespawnType();
  const threat=playerThreatMap();
  let best=null,bs=-1e9;
  for(let c=0;c<6;c++){
    if(at(0,c))continue;
    if(mains("E").length>=2 && !respawnColorOk("E",c))continue;
    const t=threat[0*6+c]||0;
    const s=-t*10+Math.random();
    if(s>bs){bs=s;best=c;}
  }
  if(best===null){for(let c=0;c<6;c++)if(!at(0,c)){best=c;break;}}
  if(best===null)return;
  const p=makePiece(type,"E",0,best);
  G.pieces.push(p);
  log(`敵軍：${PIECES[type].name}を召喚`,"e");
  sfx("place");
}

/* =========================================================
   移動・トラップ・忍者
   ========================================================= */
function moveDirs(p){
  if(p.type==="kiba") return ALL8;
  if(p.type==="ninja"&&p.flags.invisible) return ALL8;
  return ORTHO;
}
function stepOptions(p){
  const out=[];
  if(p.ap<1)return out;
  for(const [dr,dc] of moveDirs(p)){
    let nr=p.r+dr,nc=p.c+dc;
    if(p.type==="boken"){nc=(nc+6)%6;}
    if(!inB(nr,nc))continue;
    if(visAt(nr,nc,p.owner))continue;
    if(!colorOk(p.owner,p.id,nr,nc))continue;
    out.push([nr,nc]);
  }
  return out;
}
function jumpOptions(p){
  const out=[];
  if(p.type!=="kiba"||p.ap<2)return out;
  for(const [dr,dc] of ALL8){
    const mr=p.r+dr,mc=p.c+dc,nr=p.r+dr*2,nc=p.c+dc*2;
    if(!inB(mr,mc)||!inB(nr,nc))continue;
    if(!visAt(mr,mc,p.owner))continue;
    if(visAt(nr,nc,p.owner))continue;
    if(!colorOk(p.owner,p.id,nr,nc))continue;
    out.push([nr,nc]);
  }
  return out;
}
/* マスに入る処理（罠・透明忍者を解決）戻り値: "ok"|"bounced"|"dead" */
function enterSquare(p,nr,nc){
  const prevR=p.r,prevC=p.c;
  // 透明忍者チェック
  const hidden=at(nr,nc);
  if(hidden && hidden!==p && hidden.flags.invisible && hidden.owner!==p.owner){
    hidden.flags.invisible=false;
    log(`そこには透明の忍者が潜んでいた！`,"s");
    sfx("trap");
    dealDamage(p,3,null,"ninja");
    return p.dead?"dead":"bounced";
  }
  p.r=nr;p.c=nc;
  // 罠チェック
  const ti=G.traps.findIndex(t=>t.r===nr&&t.c===nc&&t.owner!==p.owner);
  if(ti>=0){
    G.traps.splice(ti,1);
    sfx("trap");
    log(`${pieceLabel(p)}は罠にかかった！（1ダメ・行動力-1）`,"s");
    p.ap=Math.max(0,p.ap-1);
    dealDamage(p,1,null,"trap");
    if(p.dead)return "dead";
  }
  return "ok";
}
function tryStep(p,nr,nc){
  p.ap--;
  const res=enterSquare(p,nr,nc);
  if(res==="ok")sfx("move");
  return res;
}

/* =========================================================
   攻撃
   ========================================================= */
function atkDamage(p,kind){
  let d=1;
  if(p.type==="kenshi")d+=0.5;
  if(p.type==="senshi"){ if(p.hp<=1)d+=2; else if(p.hp<=2)d+=1; }
  if(p.type==="yusha"&&p.flags.heroBoost&&kind==="melee")d=3;
  return d;
}
function normalAttackCells(p){
  if(PIECES[p.type].noNormal)return [];
  if(p.flags.invisible)return []; // 忍者：透明中は通常攻撃不可
  let dirs;
  if(p.type==="souhei") dirs=[...DIAG,[frontDr(p.owner),0]];
  else dirs=ORTHO;
  return dirs.map(([dr,dc])=>[p.r+dr,p.c+dc]).filter(([r,c])=>inB(r,c));
}
function rangedCellsFrom(p,r,c){
  const out=[];
  if(p.type==="kyuhei"){
    for(const [dr,dc] of ORTHO){
      out.push([r+dr,c+dc]);out.push([r+dr*2,c+dc*2]);
    }
    for(const [dr,dc] of DIAG)out.push([r+dr,c+dc]);
  }else if(p.type==="sogeki"){
    for(const [dr,dc] of DIAG)for(let k=1;k<=3;k++)out.push([r+dr*k,c+dc*k]);
  }
  return out.filter(([rr,cc])=>inB(rr,cc));
}
function performAttack(attacker,target,kind){
  const d=atkDamage(attacker,kind);
  log(`${pieceLabel(attacker)}の${kind==="ranged"?"遠距離攻撃":"攻撃"}！`,attacker.owner==="P"?"p":"e");
  dealDamage(target,d,attacker,kind);
}

/* =========================================================
   ターン進行（プレイヤー）
   ========================================================= */
function startPlayerTurn(){
  if(G.over)return;
  G.turn="P"; G.phase="action";
  G.slotsLeft=1; G.currentActor=null; G.attackUsed=false; G.acted=false;
  for(const p of alive("P")){
    p.ap=Math.max(0,p.maxAp-(p.flags.apCut?1:0));
    if(p.flags.apCut){log(`${pieceLabel(p)}は術で行動力が下がっている`,"s");}
    p.flags.apCut=false;
  }
  UI={mode:"action",sel:null,targets:new Set(),ability:null,extra:{}};
  setPhaseBar('<span class="turnP">あなたの手番 — 行動フェーズ（駒1体を選んで移動／能力）</span>');
  render();
}
function gotoAttackPhase(){
  if(!G.acted&&hasAnyPlayerAction()){
    log("先に駒1体を選んで移動か能力で行動力を消費してください","s");
    return;
  }
  G.phase="attack";
  UI={mode:"attack",sel:null,targets:new Set(),ability:null,extra:{}};
  setPhaseBar('<span class="turnP">攻撃フェーズ — 攻撃する駒を選択（スキップ可）</span>');
  render();
}
function afterPlayerAttack(){
  processRespawns(()=>{
    if(G.over)return;
    shieldPhase("P",()=>finishPlayerTurn());
  });
}
function shieldPhase(owner,cont){
  const shields=alive(owner).filter(p=>p.type==="tatehei");
  if(shields.length===0){cont();return;}
  if(owner==="E"){ // AIは脅威の高い方向を防ぐ
    for(const s of shields)aiSetShield(s);
    cont();return;
  }
  let i=0;
  const next=()=>{
    if(i>=shields.length){UI={mode:"idle",sel:null,targets:new Set(),ability:null,extra:{}};cont();return;}
    const s=shields[i++];
    const opts=ORTHO.map(([dr,dc])=>[s.r+dr,s.c+dc]).filter(([r,c])=>inB(r,c));
    UI={mode:"shield",sel:s.id,targets:new Set(opts.map(o=>o.join(","))),ability:null,
        extra:{piece:s,next}};
    setPhaseBar('<span class="turnP">盾兵 — 防御するマスを指定（変更しない場合はスキップ）</span>');
    render();
  };
  next();
}
function finishPlayerTurn(){
  if(G.over)return;
  explodeBombs("P",()=>{
    if(G.over)return;
    // 相手（E）所有の透明解除：Pの手番終了で解除されるのはE忍者
    for(const p of alive("E"))p.flags.invisible=false;
    for(const p of alive("P"))p.flags.noAttack=false;
    if(NET.on){
      G.turn="E";G.phase="action";
      netSend("go");
      netDispatch();
      return;
    }
    setTimeout(startAITurn,450);
  });
}
function explodeBombs(owner,cont){
  const ready=[],rest=[];
  for(const b of G.bombs){
    if(b.owner===owner){
      if(b.fuse<=0)ready.push(b);
      else{b.fuse--;rest.push(b);}
    }else rest.push(b);
  }
  G.bombs=rest;
  for(const b of ready){
    sfx("bomb");
    log(`爆弾が炸裂！`, "s");
    for(const [dr,dc] of ALL8){
      const t=at(b.r+dr,b.c+dc);
      if(t)dealDamage(t,1,null,"bomb");
      if(G.over)return;
    }
  }
  render();
  processRespawns(cont);
}

/* =========================================================
   能力（プレイヤーUI）
   ========================================================= */
function takeActionSlot(p){
  if(G.currentActor===p.id){G.acted=true;return true;}
  if(G.currentActor!==null){
    if(G.slotsLeft<=0)return false;
    G.currentActor=null; // 行動枠が残っていれば前の駒を自動で終了して切替
  }
  if(G.slotsLeft<=0)return false;
  G.currentActor=p.id; G.slotsLeft--; G.acted=true;
  return true;
}
/* 行動可能な駒が1体でも存在するか（手詰まり救済用） */
function hasAnyPlayerAction(){
  for(const p of alive("P")){
    if(stepOptions(p).length>0)return true;
    if(jumpOptions(p).length>0)return true;
    if(abilityButtons(p).some(b=>b.enabled))return true;
  }
  return false;
}
function abilityButtons(p){
  const B=[];
  const A=(label,enabled,fn)=>B.push({label,enabled,fn});
  const isMyTurnAction = (G.turn==="P"&&G.phase==="action"&&!G.over);
  if(!isMyTurnAction)return B;
  const canAct = G.slotsLeft>0||G.currentActor===p.id;
  switch(p.type){
    case "kyuhei":{
      const ts=rangedCellsFrom(p,p.r,p.c).filter(([r,c])=>{const t=visAt(r,c,"P");return t&&t.owner==="E";});
      A("遠距離攻撃（行1）",canAct&&p.ap>=1&&ts.length>0,()=>{
        UI.mode="ability"; UI.ability={type:"ranged",piece:p};
        UI.targets=new Set(ts.map(t=>t.join(",")));render();
      });break;}
    case "sogeki":{
      const ts=rangedCellsFrom(p,p.r,p.c).filter(([r,c])=>{const t=visAt(r,c,"P");return t&&t.owner==="E";});
      A("狙撃（行1）",canAct&&p.ap>=1&&ts.length>0,()=>{
        UI.mode="ability"; UI.ability={type:"ranged",piece:p};
        UI.targets=new Set(ts.map(t=>t.join(",")));render();
      });break;}
    case "jutsushi":{
      const ts=alive("E").filter(t=>!t.flags.invisible);
      A("行動阻害（行1）",canAct&&p.ap>=1&&ts.length>0,()=>{
        UI.mode="ability";UI.ability={type:"slow",piece:p};
        UI.targets=new Set(ts.map(t=>t.r+","+t.c));render();
      });break;}
    case "akuryo":{
      const ts=alive("E").filter(t=>!t.flags.invisible);
      A("呪縛：攻撃封じ（行1）",canAct&&p.ap>=1&&ts.length>0,()=>{
        UI.mode="ability";UI.ability={type:"bind",piece:p};
        UI.targets=new Set(ts.map(t=>t.r+","+t.c));render();
      });break;}
    case "wanashi":{
      const myTraps=G.traps.filter(t=>t.owner==="P").length;
      const cells=ALL8.map(([dr,dc])=>[p.r+dr,p.c+dc])
        .filter(([r,c])=>inB(r,c)&&!at(r,c)&&!G.traps.some(t=>t.r===r&&t.c===c));
      A(`罠設置（行1）残${2-myTraps}`,canAct&&p.ap>=1&&myTraps<2&&cells.length>0,()=>{
        UI.mode="ability";UI.ability={type:"trap",piece:p};
        UI.targets=new Set(cells.map(t=>t.join(",")));render();
      });break;}
    case "ninja":
      A("透明化（行1）",canAct&&p.ap>=1&&!p.flags.invisible,()=>{
        if(!takeActionSlot(p))return;
        p.ap--;p.flags.invisible=true;
        log("自軍忍者は気配を消した…（相手手番終了まで透明）","p");
        sfx("pick");render();
      });break;
    case "kusushi":{
      const ts=ORTHO.map(([dr,dc])=>at(p.r+dr,p.c+dc)).filter(t=>t);
      A("調合：隣接駒HP±1（行1・残1回）",canAct&&p.ap>=1&&!p.flags.healUsed&&ts.length>0,()=>{
        UI.mode="ability";UI.ability={type:"medicine",piece:p};
        UI.targets=new Set(ts.map(t=>t.r+","+t.c));render();
      });break;}
    case "chokyo":{
      const hasBeast=alive("P").some(b=>b.type==="kemono"&&b.flags.beastOf===p.id);
      const cells=ORTHO.map(([dr,dc])=>[p.r+dr,p.c+dc]).filter(([r,c])=>inB(r,c)&&!at(r,c));
      A("獣を召喚（行1）",canAct&&p.ap>=1&&!hasBeast&&cells.length>0,()=>{
        UI.mode="ability";UI.ability={type:"beast",piece:p};
        UI.targets=new Set(cells.map(t=>t.join(",")));render();
      });break;}
    case "gunshi":
      A("軍略：2体行動（行1＋HP0.5）",canAct&&p.ap>=1&&p.hp>0.5,()=>{
        if(!takeActionSlot(p))return;
        p.ap--;p.hp=r2(p.hp-0.5);G.slotsLeft+=2;
        G.currentActor=null;UI.sel=null;
        log("軍師の采配！このターン、駒を2体行動させられる（HP-0.5）","p");
        sfx("pick");render();
      });break;
    case "jusoshi":
      A("呪詛：敵全体HP-0.5（HP1.5）",canAct&&p.hp>1.5,()=>{
        if(!takeActionSlot(p))return;
        p.hp=r2(p.hp-1.5);
        log("呪詛師が血の代償で呪いを放った！（自HP-1.5）","p");
        for(const t of alive("E"))dealDamage(t,0.5,null,"curse");
        processRespawns(()=>render());
      });break;
    case "miko":{
      const ts=alive("P").filter(t=>t.id!==p.id);
      A("神楽：味方+1行動（行1＋HP0.5）",canAct&&p.ap>=1&&p.hp>0.5&&ts.length>0,()=>{
        UI.mode="ability";UI.ability={type:"kagura",piece:p};
        UI.targets=new Set(ts.map(t=>t.r+","+t.c));render();
      });break;}
    case "esper":{
      const ts=esperTargets(p).filter(t=>!(t.flags.invisible&&t.owner!=="P"));
      A(`念動（行1・${p.flags.esperMode==="diag"?"斜め":"縦横"}射程2）`,canAct&&p.ap>=1&&ts.length>0,()=>{
        UI.mode="ability";UI.ability={type:"psy1",piece:p};
        UI.targets=new Set(ts.map(t=>t.r+","+t.c));render();
      });break;}
    case "seishoku":
      A("祈祷：味方全HP+0.5（行1・残1回）",canAct&&p.ap>=1&&!p.flags.prayUsed,()=>{
        if(!takeActionSlot(p))return;
        p.ap--;p.flags.prayUsed=true;
        log("聖職者の祈り…味方全体のHPが0.5回復","p");
        for(const t of alive("P"))if(t.id!==p.id)healPiece(t,0.5);
        render();
      });break;
    case "majo":{
      A("入替の魔法（行1）",canAct&&p.ap>=1,()=>{
        const ts=G.pieces.filter(t=>!t.dead&&!(t.flags.invisible&&t.owner!=="P"));
        UI.mode="ability";UI.ability={type:"swap1",piece:p};
        UI.targets=new Set(ts.map(t=>t.r+","+t.c));render();
      });break;}
    case "bakudan":{
      const cells=ORTHO.map(([dr,dc])=>[p.r+dr,p.c+dc])
        .filter(([r,c])=>inB(r,c)&&!at(r,c)&&!G.bombs.some(b=>b.r===r&&b.c===c));
      A("爆弾設置（行1）",canAct&&p.ap>=1&&cells.length>0,()=>{
        UI.mode="ability";UI.ability={type:"bomb",piece:p};
        UI.targets=new Set(cells.map(t=>t.join(",")));render();
      });break;}
  }
  return B;
}
function esperTargets(p){
  const dirs=p.flags.esperMode==="diag"?DIAG:ORTHO;
  const out=[];
  for(const [dr,dc] of dirs)for(let k=1;k<=2;k++){
    const t=at(p.r+dr*k,p.c+dc*k);
    if(t)out.push(t);
  }
  return out;
}

/* 能力ターゲット解決 */
function resolveAbilityClick(r,c){
  const ab=UI.ability;
  const p=ab.piece;
  const key=r+","+c;
  if(!UI.targets.has(key)){ // キャンセル扱い
    UI.mode="action";UI.ability=null;UI.targets=new Set();render();return;
  }
  switch(ab.type){
    case "ranged":{
      const t=visAt(r,c,"P");
      if(!t||t.owner!=="E"){clearAbility();render();return;}
      if(!takeActionSlot(p))break;
      p.ap--;
      performAttack(p,t,"ranged");
      clearAbility();
      processRespawns(()=>render());
      return;}
    case "slow":{
      if(!takeActionSlot(p))break;
      p.ap--;
      const t=visAt(r,c,"P");
      if(t){t.flags.apCut=true;log(`術士の呪い…${pieceLabel(t)}の次ターン行動力-1`,"p");sfx("pick");}
      break;}
    case "bind":{
      if(!takeActionSlot(p))break;
      p.ap--;
      const t=visAt(r,c,"P");
      if(t){t.flags.noAttack=true;log(`悪霊が取り憑いた…${pieceLabel(t)}は次の手番、通常攻撃不可`,"p");sfx("pick");}
      break;}
    case "trap":{
      if(!takeActionSlot(p))break;
      p.ap--;
      G.traps.push({owner:"P",r,c});
      log("罠を仕掛けた（敵には見えない）","p",true);sfx("pick");
      break;}
    case "medicine":{
      const t=at(r,c);
      if(!t)break;
      if(!takeActionSlot(p))break;
      p.ap--;p.flags.healUsed=true;
      if(t.owner==="P"){healPiece(t,1);}
      else{log("薬師は毒を盛った！","p");dealDamage(t,1,p,"curse");}
      clearAbility();
      processRespawns(()=>render());
      return;}
    case "beast":{
      if(!takeActionSlot(p))break;
      p.ap--;
      const b=makePiece("kemono","P",r,c);
      b.flags.beastOf=p.id;
      G.pieces.push(b);
      log("調教師が獣を召喚した（HP1）","p");sfx("place");
      break;}
    case "kagura":{
      const t=at(r,c);
      if(!t||t.owner!=="P")break;
      if(!takeActionSlot(p))break;
      p.ap--;p.hp=r2(p.hp-0.5);
      t.ap++;G.slotsLeft++;
      G.currentActor=null;UI.sel=t.id;
      log(`巫女の神楽…${pieceLabel(t)}の行動力+1、続けて行動できる（巫女HP-0.5）`,"p");sfx("heal");
      break;}
    case "psy1":{
      const t=at(r,c);
      if(!t)break;
      const cells=ALL8.map(([dr,dc])=>[t.r+dr,t.c+dc])
        .filter(([rr,cc])=>inB(rr,cc)&&!at(rr,cc)
          &&(t.owner!=="P"||t.type==="kemono"||colorOk("P",t.id,rr,cc))
          &&(t.owner!=="E"||colorOk("E",t.id,rr,cc)));
      if(cells.length===0)break;
      UI.ability={type:"psy2",piece:p,target:t};
      UI.targets=new Set(cells.map(x=>x.join(",")));
      render();return;}
    case "psy2":{
      if(!takeActionSlot(p))break;
      p.ap--;
      const t=ab.target;
      log(`超能力者の念動！${pieceLabel(t)}を動かした`,"p");
      enterSquare(t,r,c);
      sfx("move");
      clearAbility();
      processRespawns(()=>render());
      return;}
    case "swap1":{
      const t=at(r,c);
      if(!t)break;
      const partners=G.pieces.filter(x=>!x.dead&&x.owner===t.owner&&x.id!==t.id&&!(x.flags.invisible&&x.owner!=="P"));
      if(partners.length===0)break;
      UI.ability={type:"swap2",piece:p,first:t};
      UI.targets=new Set(partners.map(x=>x.r+","+x.c));
      render();return;}
    case "swap2":{
      const t=at(r,c);
      if(!t||t.owner!==ab.first.owner)break;
      if(!takeActionSlot(p))break;
      p.ap--;
      const a=ab.first;
      const ar=a.r,acn=a.c;
      a.r=t.r;a.c=t.c;t.r=ar;t.c=acn;
      log(`魔女の入替魔法！${PIECES[a.type].name}と${PIECES[t.type].name}が入れ替わった`,"p");
      sfx("move");
      break;}
    case "bomb":{
      if(!takeActionSlot(p))break;
      p.ap--;
      G.bombs.push({owner:"P",r,c,fuse:1});
      log("爆弾を設置した（次の自分手番終了時に爆発）","p");sfx("pick");
      break;}
  }
  clearAbility();
  render();
}
function clearAbility(){
  UI.mode=(G.phase==="action")?"action":"attack";
  UI.ability=null;UI.targets=new Set();
}

/* =========================================================
   盤面クリック
   ========================================================= */
function onCell(r,c){
  if(G.over)return;
  const key=r+","+c;
  switch(UI.mode){
    case "setup-place":
      if(UI.targets.has(key))placePlayerPiece(r,c);
      return;
    case "respawn-place":
      if(UI.targets.has(key))placeRespawn(r,c);
      return;
    case "maou":{
      if(!UI.targets.has(key))return;
      const t=at(r,c);
      if(t&&t.owner==="E")UI.extra.cb(t);
      return;}
    case "shield":{
      const s=UI.extra.piece;
      if(UI.targets.has(key)){
        s.flags.block={r,c};
        log("盾兵が防御方向を構えた","p");sfx("pick");
        UI.extra.next();
      }
      return;}
    case "ability":
      resolveAbilityClick(r,c);return;
    case "watch":{
      const p=at(r,c);
      if(p&&!(p.flags.invisible&&p.owner==="E")){UI.sel=p.id;sfx("pick");}
      else UI.sel=null;
      render();return;}
    case "action":{
      const p=at(r,c);
      // 自駒選択
      if(p&&p.owner==="P"){
        if(G.currentActor!==null&&G.currentActor!==p.id&&G.slotsLeft<=0){
          // 行動中の駒以外は選べない（情報表示のみ）
          UI.sel=p.id;sfx("pick");render();return;
        }
        UI.sel=p.id;sfx("pick");render();return;
      }
      // 敵駒選択（効果の確認のみ）
      if(p&&p.owner==="E"&&!p.flags.invisible){
        UI.sel=p.id;sfx("pick");render();return;
      }
      // 移動先クリック
      if(UI.sel!==null){
        const a=byId(UI.sel);
        if(a&&a.owner==="P"){
          const steps=stepOptions(a).map(x=>x.join(","));
          const jumps=jumpOptions(a).map(x=>x.join(","));
          const canActHere=G.slotsLeft>0||G.currentActor===a.id;
          if(canActHere&&steps.includes(key)){
            if(!takeActionSlot(a))return;
            tryStep(a,r,c);
            processRespawns(()=>render());
            return;
          }
          if(canActHere&&jumps.includes(key)){
            if(!takeActionSlot(a))return;
            a.ap-=2;
            log("騎馬が跳躍した！","p");
            enterSquare(a,r,c);
            sfx("move");
            processRespawns(()=>render());
            return;
          }
        }
      }
      UI.sel=null;render();return;}
    case "attack":{
      const p=at(r,c);
      if(p&&p.owner==="P"){
        UI.sel=p.id;sfx("pick");render();return;
      }
      if(UI.sel!==null){
        const a=byId(UI.sel);
        if(a&&a.owner==="P"&&!a.flags.noAttack){
          const cells=normalAttackCells(a).map(x=>x.join(","));
          if(cells.includes(key)){
            const t=visAt(r,c,"P");
            if(t&&t.owner==="E"){
              G.attackUsed=true;
              performAttack(a,t,"melee");
              UI={mode:"idle",sel:null,targets:new Set(),ability:null,extra:{}};
              render();
              afterPlayerAttack();
              return;
            }
          }
        }
      }
      // 敵駒選択（効果の確認のみ）
      if(p&&p.owner==="E"&&!p.flags.invisible){
        UI.sel=p.id;sfx("pick");render();return;
      }
      UI.sel=null;render();return;}
  }
}

/* =========================================================
   AI
   ========================================================= */
const AI_POOL=["kenshi","kyuhei","kiba","senshi","souhei","sogeki","kyuketsuki","jusoshi"];
function aiPickComposition(){
  const ranged=["kyuhei","sogeki"][Math.random()<0.5?0:1];
  const others=AI_POOL.filter(t=>t!=="kyuhei"&&t!=="sogeki");
  const a=others[Math.floor(Math.random()*others.length)];
  let b=others[Math.floor(Math.random()*others.length)];
  if(b===a&&Math.random()<0.6)b=others[Math.floor(Math.random()*others.length)];
  return [a,ranged,b];
}
function aiPickRespawnType(){
  const w=["senshi","senshi","kiba","sogeki","kyuhei","kenshi","souhei","kyuketsuki","jusoshi"];
  return w[Math.floor(Math.random()*w.length)];
}
function aiPlaceSetup(){
  const type=G.aiTypes[G.setupCount.E];
  const prefer=[1,4,2,3,0,5];
  let col=null;
  for(const c of prefer){
    if(at(0,c))continue;
    if(G.setupCount.E===2&&!colorOkPlacement("E",c))continue;
    col=c;break;
  }
  if(col===null){for(let c=0;c<6;c++)if(!at(0,c)){col=c;break;}}
  const p=makePiece(type,"E",0,col);
  G.pieces.push(p);
  G.setupCount.E++;
  log(`敵軍：${PIECES[type].name}を配置`,"e");
  sfx("place");
}
function aiSetShield(s){
  const threat=playerThreatMap();
  let best=null,bt=-1;
  for(const [dr,dc] of ORTHO){
    const r=s.r+dr,c=s.c+dc;
    if(!inB(r,c))continue;
    const t=threat[r*6+c]||0;
    if(t>bt){bt=t;best={r,c};}
  }
  if(best){s.flags.block=best;log("敵の盾兵が防御方向を構えた","e");}
}

/* --- 脅威マップ：プレイヤーが次ターンに攻撃できるマスと最大ダメージ --- */
function playerThreatMap(){
  const map={};
  const mark=(r,c,d)=>{if(!inB(r,c))return;const k=r*6+c;if(!map[k]||map[k]<d)map[k]=d;};
  for(const f of alive("P")){
    if(f.flags.invisible)continue; // AIは透明駒を知らない
    const reach=reachSquares(f,f.maxAp,true);
    const dM=atkDamage(f,"melee"),dR=atkDamage(f,"ranged");
    for(const [r,c] of reach){
      if(!PIECES[f.type].noNormal){
        const dirs=f.type==="souhei"?[...DIAG,[frontDr(f.owner),0]]:ORTHO;
        for(const [dr,dc] of dirs)mark(r+dr,c+dc,dM);
      }
      if(f.type==="kyuhei"||f.type==="sogeki"){
        for(const [rr,cc] of rangedCellsFrom(f,r,c))mark(rr,cc,dR);
      }
    }
  }
  return map;
}
/* BFS到達範囲（自駒・敵駒で遮断、色制約は緩く無視可） */
function reachSquares(p,maxSteps,loose){
  const seen=new Set([p.r+","+p.c]);
  const out=[[p.r,p.c]];
  let frontier=[[p.r,p.c]];
  const dirs=moveDirs(p);
  for(let s=0;s<maxSteps;s++){
    const nf=[];
    for(const [r,c] of frontier){
      for(const [dr,dc] of dirs){
        let nr=r+dr,nc=c+dc;
        if(p.type==="boken")nc=(nc+6)%6;
        if(!inB(nr,nc))continue;
        const k=nr+","+nc;
        if(seen.has(k))continue;
        if(visAt(nr,nc,p.owner))continue;
        if(!loose&&!colorOk(p.owner,p.id,nr,nc))continue;
        seen.add(k);nf.push([nr,nc]);out.push([nr,nc]);
      }
    }
    frontier=nf;
  }
  return out;
}
/* BFS（経路つき・色制約あり） */
function reachWithPaths(p){
  const start=p.r+","+p.c;
  const res={[start]:{cost:0,path:[]}};
  let frontier=[[p.r,p.c]];
  const dirs=moveDirs(p);
  for(let s=0;s<p.ap;s++){
    const nf=[];
    for(const [r,c] of frontier){
      const cur=res[r+","+c];
      for(const [dr,dc] of dirs){
        let nr=r+dr,nc=c+dc;
        if(p.type==="boken")nc=(nc+6)%6;
        if(!inB(nr,nc))continue;
        const k=nr+","+nc;
        if(res[k])continue;
        if(visAt(nr,nc,p.owner))continue;
        if(!colorOk(p.owner,p.id,nr,nc))continue;
        res[k]={cost:cur.cost+1,path:[...cur.path,[nr,nc]]};
        nf.push([nr,nc]);
      }
    }
    frontier=nf;
  }
  // 騎馬の跳躍
  if(p.type==="kiba"&&p.ap>=2){
    for(const [dr,dc] of ALL8){
      const mr=p.r+dr,mc=p.c+dc,nr=p.r+dr*2,nc=p.c+dc*2;
      if(!inB(mr,mc)||!inB(nr,nc))continue;
      if(!visAt(mr,mc,p.owner))continue;
      if(visAt(nr,nc,p.owner))continue;
      if(!colorOk(p.owner,p.id,nr,nc))continue;
      const k=nr+","+nc;
      if(!res[k]||res[k].cost>2)res[k]={cost:2,path:[[nr,nc]],jump:true};
    }
  }
  return res;
}

function startAITurn(){
  if(G.over)return;
  G.turn="E";G.phase="action";
  for(const p of alive("E")){
    p.ap=Math.max(0,p.maxAp-(p.flags.apCut?1:0));
    p.flags.apCut=false;
  }
  setPhaseBar('<span class="turnE">敵軍の手番 — 思考中…</span>');
  UI={mode:"ai",sel:null,targets:new Set(),ability:null,extra:{}};
  render();
  setTimeout(()=>{
    const plan=aiMakePlan();
    aiExecutePlan(plan);
  },650);
}

function aiMakePlan(){
  const threat=playerThreatMap();
  const foes=alive("P").filter(f=>!f.flags.invisible);
  const myList=alive("E");
  const cands=[];

  const baseSim=()=>G.pieces.filter(p=>!p.dead).map(p=>({
    id:p.id,type:p.type,owner:p.owner,r:p.r,c:p.c,hp:p.hp,
    block:p.flags.block,phoenix:p.flags.phoenix,noAttack:p.flags.noAttack,
    invisible:p.flags.invisible,heroBoost:p.flags.heroBoost
  }));

  function simAtkDamage(sp,kind){
    let d=1;
    if(sp.type==="kenshi")d+=0.5;
    if(sp.type==="senshi"){if(sp.hp<=1)d+=2;else if(sp.hp<=2)d+=1;}
    if(sp.type==="yusha"&&sp.heroBoost&&kind==="melee")d=3;
    return d;
  }
  function simHit(sim,attacker,target,kind,events){
    if(target.invisible)return;
    if(target.block&&attacker&&attacker.r===target.block.r&&attacker.c===target.block.c)return;
    const d=simAtkDamage(attacker,kind);
    let eff=d;
    let killed=target.hp-d<=0;
    if(killed&&target.type==="fushicho"&&!target.phoenix){killed=false;target.hp=0.5;eff=d;}
    else target.hp=r2(target.hp-d);
    events.push({dmg:eff,killed,tHp:Math.max(0,target.hp),tType:target.type});
    if(killed)target.dead=true;
  }

  function evalPlan(mover,dest,apAfter,ability){
    const sim=baseSim();
    const sm=sim.find(x=>x.id===mover.id);
    sm.r=dest.r;sm.c=dest.c;
    const events=[];
    // ability
    if(ability&&ability.kind==="ranged"){
      const t=sim.find(x=>x.id===ability.targetId&&!x.dead);
      if(t)simHit(sim,sm,t,"ranged",events);
    }
    if(ability&&ability.kind==="curse"){
      sm.hp=r2(sm.hp-1.5);
      for(const t of sim.filter(x=>x.owner==="P"&&!x.dead&&!x.invisible)){
        let killed=t.hp-0.5<=0;
        if(killed&&t.type==="fushicho"&&!t.phoenix){killed=false;t.hp=0.5;}
        else t.hp=r2(t.hp-0.5);
        events.push({dmg:0.5,killed,tHp:Math.max(0,t.hp),tType:t.type});
        if(killed)t.dead=true;
      }
    }
    // best normal attack（駒1体で1回）
    let bestAtk=null,bestAtkScore=-1;
    for(const a of sim.filter(x=>x.owner==="E"&&!x.dead&&!x.noAttack&&!x.invisible)){
      if(PIECES[a.type].noNormal)continue;
      const dirs=a.type==="souhei"?[...DIAG,[1,0]]:ORTHO;
      for(const [dr,dc] of dirs){
        const t=sim.find(x=>!x.dead&&x.owner==="P"&&!x.invisible&&x.r===a.r+dr&&x.c===a.c+dc);
        if(!t)continue;
        const d=simAtkDamage(a,"melee");
        let kills=t.hp-d<=0&&!(t.type==="fushicho"&&!t.phoenix);
        const s=(kills?900:0)+d*200+d*(3-Math.max(0,t.hp-d))*30;
        if(t.block&&a.r===t.block.r&&a.c===t.block.c)continue;
        if(s>bestAtkScore){bestAtkScore=s;bestAtk={attackerId:a.id,targetId:t.id};}
      }
    }
    if(bestAtk){
      const a=sim.find(x=>x.id===bestAtk.attackerId);
      const t=sim.find(x=>x.id===bestAtk.targetId);
      if(a&&t&&!t.dead)simHit(sim,a,t,"melee",events);
    }
    // score
    let score=0,killsNow=G.kills.E;
    for(const e of events){
      if(e.killed&&e.tType!=="kemono"){
        killsNow++;score+=900;
        if(killsNow>=2)score+=100000;
      }else if(e.killed){score+=350;}
      else score+=e.dmg*230+e.dmg*(3-e.tHp)*45;
    }
    // 被脅威
    const risks=[];
    for(const m of sim.filter(x=>x.owner==="E"&&!x.dead)){
      const t=threat[m.r*6+m.c]||0;
      if(t<=0)continue;
      if(t>=m.hp)risks.push(820+(G.kills.P>=1?500:0));
      else risks.push(t*55);
    }
    risks.sort((a,b)=>b-a);
    if(killsNow<2){
      if(risks.length)score-=risks[0];
      for(let i=1;i<risks.length;i++)score-=risks[i]*0.3;
    }
    // 接近・位置
    for(const m of sim.filter(x=>x.owner==="E"&&!x.dead)){
      let md=99;
      for(const f of sim.filter(x=>x.owner==="P"&&!x.dead&&!x.invisible)){
        md=Math.min(md,Math.abs(m.r-f.r)+Math.abs(m.c-f.c));
      }
      if(md<99)score-=md*13;
    }
    score+=Math.random()*8;
    return {score,attack:bestAtk};
  }

  for(const p of myList){
    const reach=reachWithPaths(p);
    for(const key in reach){
      const [r,c]=key.split(",").map(Number);
      const info=reach[key];
      const apAfter=p.ap-info.cost;
      const tryC=(ability)=>{
        const ev=evalPlan(p,{r,c},apAfter,ability);
        cands.push({score:ev.score,pieceId:p.id,path:info.path,jump:info.jump,
                    ability,attack:ev.attack});
      };
      tryC(null);
      if((p.type==="kyuhei"||p.type==="sogeki")&&apAfter>=1){
        for(const [rr,cc] of rangedCellsFrom(p,r,c)){
          const t=foes.find(f=>f.r===rr&&f.c===cc);
          if(t)tryC({kind:"ranged",targetId:t.id});
        }
      }
      if(p.type==="jusoshi"&&p.hp>1.5&&info.cost===0){
        tryC({kind:"curse"});
      }
    }
  }
  cands.sort((a,b)=>b.score-a.score);
  if(cands.length===0)return null;
  // 行動必須ルール：移動も能力もない候補は、他に選択肢がない場合のみ許可
  const acting=cands.filter(c=>(c.path&&c.path.length>0)||c.ability);
  const pool=acting.length?acting:cands;
  if(aiLevel==="hard")return pool[0];
  // ふつう：上位の中からランダム
  const top=pool.filter(c=>c.score>=pool[0].score*0.8||pool.indexOf(c)<4);
  return top[Math.floor(Math.random()*Math.min(top.length,4))];
}

function aiExecutePlan(plan){
  const steps=[];
  if(plan){
    const p=byId(plan.pieceId);
    if(p){
      if(plan.jump&&plan.path.length){
        const [r,c]=plan.path[plan.path.length-1];
        steps.push(()=>{
          if(p.dead||p.ap<2)return;
          p.ap-=2;
          log("敵の騎馬が跳躍した！","e");
          enterSquare(p,r,c);sfx("move");
        });
      }else{
        for(const [r,c] of plan.path){
          steps.push(()=>{
            if(p.dead||p.ap<1)return;
            if(visAt(r,c,"E"))return;
            tryStep(p,r,c);
          });
        }
      }
      if(plan.ability){
        if(plan.ability.kind==="ranged"){
          steps.push(()=>{
            if(p.dead||p.ap<1)return;
            const t=byId(plan.ability.targetId);
            if(!t||t.flags.invisible)return;
            if(!rangedCellsFrom(p,p.r,p.c).some(([r,c])=>r===t.r&&c===t.c))return;
            p.ap--;
            performAttack(p,t,"ranged");
          });
        }else if(plan.ability.kind==="curse"){
          steps.push(()=>{
            if(p.dead||p.hp<=1.5)return;
            p.hp=r2(p.hp-1.5);
            log("敵の呪詛師が呪いを放った！（敵全体HP-0.5）","e");
            for(const t of alive("P"))dealDamage(t,0.5,null,"curse");
          });
        }
      }
    }
    if(plan.attack){
      steps.push(()=>{
        const a=byId(plan.attack.attackerId);
        let t=byId(plan.attack.targetId);
        if(!a||a.flags.noAttack)return;
        // 予定ターゲットが消えていたら隣接の敵を再探索
        const cellOk=t&&!t.flags.invisible&&normalAttackCells(a).some(([r,c])=>r===t.r&&c===t.c);
        if(!cellOk){
          t=null;
          for(const [r,c] of normalAttackCells(a)){
            const x=visAt(r,c,"E");
            if(x&&x.owner==="P"){t=x;break;}
          }
        }
        if(t)performAttack(a,t,"melee");
      });
    }
  }
  steps.push(()=>{});
  let i=0;
  const run=()=>{
    if(G.over)return;
    if(G.respawnQueue.length){processRespawns(run);return;}
    if(i>=steps.length){finishAITurn();return;}
    const f=steps[i++];
    f();
    render();
    setTimeout(run,430);
  };
  run();
}
function finishAITurn(){
  if(G.over)return;
  shieldPhase("E",()=>{
    explodeBombs("E",()=>{
      if(G.over)return;
      for(const p of alive("P"))p.flags.invisible=false;
      for(const p of alive("E"))p.flags.noAttack=false;
      setTimeout(startPlayerTurn,400);
    });
  });
}

function setPhaseBar(html){$("#phaseBar").innerHTML=html;}
function render(){
  const board=$("#board");
  board.innerHTML="";
  // 選択駒の移動ハイライト計算
  let moveSet=new Set(),jumpSet=new Set(),atkSet=new Set();
  if(!G.over){
    if(UI.mode==="action"&&UI.sel!==null){
      const p=byId(UI.sel);
      if(p&&p.owner==="P"){
        const can=(G.currentActor===null&&G.slotsLeft>0)||G.currentActor===p.id;
        if(can){
          moveSet=new Set(stepOptions(p).map(x=>x.join(",")));
          jumpSet=new Set(jumpOptions(p).map(x=>x.join(",")));
        }
      }
    }
    if(UI.mode==="attack"&&UI.sel!==null){
      const p=byId(UI.sel);
      if(p&&p.owner==="P"&&!p.flags.noAttack){
        for(const [r,c] of normalAttackCells(p)){
          const t=visAt(r,c,"P");
          if(t&&t.owner==="E")atkSet.add(r+","+c);
        }
      }
    }
  }
  for(let r=0;r<6;r++)for(let c=0;c<6;c++){
    const cell=document.createElement("div");
    cell.className="cell "+(c<3?"L":"R")+(r===5?" homeP":r===0?" homeE":"");
    const key=r+","+c;
    if(UI.targets.has(key))cell.classList.add("hl-tgt");
    if(moveSet.has(key))cell.classList.add("hl-move");
    if(jumpSet.has(key))cell.classList.add("hl-jump");
    if(atkSet.has(key))cell.classList.add("hl-atk");
    const hl=document.createElement("div");hl.className="hl";cell.appendChild(hl);
    // markers
    for(const t of G.traps)if(t.r===r&&t.c===c&&t.owner==="P"){
      const m=document.createElement("div");m.className="marker mk-trap";m.textContent="✕";cell.appendChild(m);
    }
    for(const b of G.bombs)if(b.r===r&&b.c===c){
      const m=document.createElement("div");m.className="marker mk-bomb";m.textContent="💣";cell.appendChild(m);
    }
    for(const p of G.pieces)if(!p.dead&&p.flags.block&&p.flags.block.r===r&&p.flags.block.c===c){
      const m=document.createElement("div");m.className="marker mk-block";m.textContent="⛨";cell.appendChild(m);
    }
    const p=at(r,c);
    if(p&&!(p.flags.invisible&&p.owner==="E")){
      const d=document.createElement("div");
      d.className="piece "+p.owner;
      if(p.flags.invisible)d.classList.add("invis");
      if(UI.sel===p.id)cell.classList.add("hl-sel");
      if(G.currentActor===p.id)d.classList.add("actorNow");
      if(p.flash){d.classList.add("flash");p.flash=false;}
      if(p.spawn){d.classList.add("spawn");p.spawn=false;}
      const kj=document.createElement("div");kj.className="kj";kj.textContent=PIECES[p.type].k;
      d.appendChild(kj);
      const hpRow=document.createElement("div");hpRow.className="hpRow";
      const full=Math.floor(p.hp),halfHp=p.hp-full>=0.5;
      for(let i=0;i<full;i++){const b=document.createElement("i");hpRow.appendChild(b);}
      if(halfHp){const b=document.createElement("i");b.className="half";hpRow.appendChild(b);}
      d.appendChild(hpRow);
      if(p.owner==="P"&&G.turn==="P"&&(G.phase==="action")&&p.ap>0){
        const apRow=document.createElement("div");apRow.className="apRow";
        for(let i=0;i<p.ap;i++){const b=document.createElement("i");apRow.appendChild(b);}
        d.appendChild(apRow);
      }
      const badges=document.createElement("div");badges.className="badges";
      if(p.flags.invisible)badges.appendChild(badgeEl("透"));
      if(p.flags.noAttack)badges.appendChild(badgeEl("縛"));
      if(p.flags.apCut)badges.appendChild(badgeEl("遅"));
      if(p.flags.heroBoost)badges.appendChild(badgeEl("覚"));
      d.appendChild(badges);
      cell.appendChild(d);
    }
    cell.onclick=()=>onCell(r,c);
    board.appendChild(cell);
  }
  renderCtrl();
  renderInfo();
  updateScore();
  scheduleWatch();
}
function badgeEl(t){const s=document.createElement("span");s.textContent=t;return s;}

function renderCtrl(){
  const ctrl=$("#ctrl");
  ctrl.innerHTML="";
  const btn=(label,cls,fn,dis)=>{
    const b=document.createElement("button");
    b.className="act"+(cls?" "+cls:"");
    b.textContent=label;b.disabled=!!dis;b.onclick=fn;
    ctrl.appendChild(b);
  };
  if(G.over){btn("もう一度戦う","primary",()=>showStart());return;}
  if(G.turn==="P"){
    if(UI.mode==="action"){
      if(G.currentActor!==null&&G.slotsLeft>0){
        btn("この駒の行動を終える","",()=>{G.currentActor=null;UI.sel=null;render();});
      }
      const mustAct=!G.acted&&hasAnyPlayerAction();
      btn(mustAct?"攻撃フェーズへ（要：駒1体の行動）":"攻撃フェーズへ","primary",()=>gotoAttackPhase(),mustAct);
    }else if(UI.mode==="ability"){
      btn("キャンセル","",()=>{clearAbility();render();});
    }else if(UI.mode==="attack"){
      btn("攻撃しない（手番終了）","danger",()=>{
        UI={mode:"idle",sel:null,targets:new Set(),ability:null,extra:{}};
        render();afterPlayerAttack();
      });
    }else if(UI.mode==="shield"){
      btn("変更しない","",()=>{UI.extra.next();});
      if(UI.extra.piece.flags.block)btn("防御を解除","danger",()=>{
        UI.extra.piece.flags.block=null;UI.extra.next();
      });
    }
  }
}
function renderInfo(){
  const el=$("#infoPanel");
  let p=UI.sel!==null?byId(UI.sel):null;
  if(UI.mode==="ability"&&UI.ability)p=UI.ability.piece;
  if(!p){
    if(UI.mode==="ai")el.innerHTML='<span style="color:var(--sub)">敵軍が思考しています…</span>';
    else el.innerHTML='<span style="color:var(--sub)">駒を選択すると詳細が表示されます。</span>';
    return;
  }
  const I=PIECES[p.type];
  let html=`<span class="pname">${I.name}</span>
    <span class="stat">${p.owner==="P"?"自軍":"敵軍"}／HP ${fmt(p.hp)}／行動力 ${p.ap}/${p.maxAp}</span>
    <div class="desc">${I.desc}</div>`;
  el.innerHTML=html;
  if(p.owner==="P"&&UI.mode!=="ability"){
    const btns=abilityButtons(p);
    if(btns.length){
      const wrap=document.createElement("div");wrap.className="abilBtns";
      for(const b of btns){
        const bb=document.createElement("button");
        bb.className="act";bb.textContent=b.label;bb.disabled=!b.enabled;
        bb.onclick=b.fn;
        wrap.appendChild(bb);
      }
      el.appendChild(wrap);
    }
  }
  if(UI.mode==="ability"){
    const note=document.createElement("div");
    note.style.cssText="margin-top:6px;color:var(--gold);font-size:12px";
    note.textContent="光っているマス／駒を選択してください（盤外をタップでキャンセル）";
    el.appendChild(note);
  }
}

function openModal(title,bodyHtml,buttons){
  $("#modalTitle").textContent=title;
  $("#modalBody").innerHTML=bodyHtml;
  const bt=$("#modalBtns");bt.innerHTML="";
  for(const b of buttons||[]){
    const e=document.createElement("button");
    e.className="act"+(b.cls?" "+b.cls:"");
    e.textContent=b.label;e.onclick=b.fn;
    bt.appendChild(e);
  }
  $("#modalBack").classList.remove("hidden");
}
function closeModal(){$("#modalBack").classList.add("hidden");}
let pickerArgs=null;
function openPiecePicker(title,cb){
  pickerArgs={title,cb};
  let html='<div class="pickGrid">';
  for(const t of PICKABLE){
    const I=PIECES[t];
    html+=`<div class="pCard" data-t="${t}">
      <div class="t"><span class="nm">${I.name}</span><span class="ap">行動力${I.ap}</span></div>
      <div class="d">${I.desc}</div></div>`;
  }
  html+="</div>";
  openModal(title,html,[{label:"盤面を確認する",fn:()=>{closeModal();showPeekBack();}}]);
  $("#modalBody").querySelectorAll(".pCard").forEach(card=>{
    card.onclick=()=>{sfx("pick");pickerArgs=null;hidePeekBack();closeModal();cb(card.dataset.t);};
  });
}
function showPeekBack(){
  hidePeekBack();
  const b=document.createElement("button");
  b.id="peekBack";b.className="act primary";b.textContent="▲ 駒の選択に戻る";
  b.onclick=()=>{hidePeekBack();if(pickerArgs)openPiecePicker(pickerArgs.title,pickerArgs.cb);};
  document.body.appendChild(b);
}
function hidePeekBack(){
  const b=document.getElementById("peekBack");
  if(b)b.remove();
}

function showHelp(){
  let rows="";
  for(const t of PICKABLE){
    const I=PIECES[t];
    rows+=`<tr><th>${I.name}<br><small style="color:var(--sub)">行${I.ap}</small></th><td>${I.desc}</td></tr>`;
  }
  openModal("ルール",`
   <div class="ruleSec"><h3>勝利条件</h3><p>相手の駒を<b>2つ</b>倒したら勝利。駒は倒されると即座に新しい駒を手前の段に召喚できます（種類変更可）。</p></div>
   <div class="ruleSec"><h3>盤面と色の制約</h3><p>6×6の盤は左右で色が分かれています。<b>自分の主力3駒が同じ色の陣に全て揃う配置・移動は禁止</b>です。</p></div>
   <div class="ruleSec"><h3>ターンの流れ</h3><p>① 行動フェーズ：<b>必ず駒1体を選び、行動力を消費して</b>移動（1マス=行動力1）や能力使用を行います（行動できる駒が1体もいない場合のみスキップ可）。<br>② 攻撃フェーズ：駒1体（移動した駒以外でも可）で通常攻撃。基本は縦横の隣接マスに1ダメージ。<br>③ ターンエンド。全駒HP3、HP0以下で撃破。</p></div>
   <div class="ruleSec"><h3>駒一覧（全24種）</h3><table>${rows}</table></div>
   <div class="ruleSec"><h3>このアプリでの裁定メモ</h3>
     <p>・行動フェーズの行動（行動力の消費）は必須です。<br>・射程内に敵がいない遠距離攻撃など、対象のない能力は使用できません。<br>・敵の駒をタップすると効果を確認できます。<br>・術士／悪霊の消費は行動力1で実装。<br>・薬師の調合と聖職者の祈祷は各1回限り。<br>・勇者は再召喚時にも魔王を指定できます。<br>・盾兵の防御指定は毎ターン攻撃フェーズ後に変更可（縦横4マスから選択）。<br>・移動と能力は行動力の範囲で同一ターンに併用できます。</p></div>
  `,[{label:"閉じる",cls:"primary",fn:closeModal}]);
}

function showStart(){
  cleanupNet();
  openModal("攻 城 戦",`
    <p style="text-align:center;letter-spacing:.1em;color:#d9cdb2">三つの駒で戦場へ。<br>敵の駒を二つ討ち取れば勝利。</p>
    <div class="ruleSec"><h3>ソロプレイ（AI対戦）</h3>
      <div class="choiceList">
        <button class="act" id="lvNormal">ふつう — 時々ゆるい手を指す</button>
        <button class="act" id="lvHard">つよい — 常に最善を狙う</button>
      </div>
    </div>
    <div class="ruleSec"><h3>オンライン対戦（ルームコード）</h3>
      <div class="choiceList">
        <button class="act primary" id="btnHost">ルームを作る — コードを発行</button>
        <button class="act primary" id="btnJoin">ルームに参加 — コードを入力</button>
      </div>
      <p style="color:var(--sub);font-size:12px;margin:6px 0 0">同じコードを入力した相手とリアルタイムで対戦できます。先手はランダムに決まります。</p>
    </div>
    <p style="color:var(--sub);font-size:12px;text-align:center">右上の「？」でいつでもルールと駒一覧を確認できます。</p>
  `,[]);
  $("#lvNormal").onclick=()=>{aiLevel="normal";closeModal();newGame();};
  $("#lvHard").onclick=()=>{aiLevel="hard";closeModal();newGame();};
  $("#btnHost").onclick=()=>{closeModal();hostRoom();};
  $("#btnJoin").onclick=()=>{closeModal();joinRoom();};
}

/* ---------- boot ---------- */
$("#helpBtn").onclick=showHelp;
$("#muteBtn").onclick=()=>{soundOn=!soundOn;$("#muteBtn").textContent=soundOn?"♪":"✕";};
showStart();
</script>
</body>
</html>
