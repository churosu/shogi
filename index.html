const AI_POOL=["kenshi","kyuhei","kiba","senshi","souhei","sogeki","kyuketsuki","jusoshi"];
/* 全24種を重み付きで抽選（強めの駒をやや厚く） */
const AI_WEIGHTS={
  kenshi:5, kyuhei:5, tatehei:4, kiba:5, senshi:6, jutsushi:3, wanashi:3,
  ninja:4, kusushi:3, chokyo:2, gunshi:3, souhei:4, fushicho:4, jusoshi:3,
  miko:3, esper:3, boken:2, kyuketsuki:5, sogeki:5, seishoku:2, majo:3,
  bakudan:3, yusha:4, akuryo:3
};
function aiWeightedPick(exclude){
  const pool=PICKABLE.filter(t=>!(exclude||[]).includes(t));
  let total=0;for(const t of pool)total+=(AI_WEIGHTS[t]||2);
  let r=Math.random()*total;
  for(const t of pool){r-=(AI_WEIGHTS[t]||2);if(r<=0)return t;}
  return pool[0];
}
function aiPickComposition(){
  // 遠距離を1枚は確保しつつ、残りは全24種から抽選
  const ranged=Math.random()<0.5?"kyuhei":"sogeki";
  const a=aiWeightedPick([ranged]);
  const b=aiWeightedPick([ranged]); // 種類重複は許容（重なってもよい）
  // 配置順をシャッフルして遠距離が必ず真ん中に来ないように
  const arr=[a,ranged,b];
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  return arr;
}
function aiPickRespawnType(){
  return aiWeightedPick([]);
}
function aiPlaceSetup(){
  const type=G.aiTypes[G.setupCount.E];
  const prefer=[1,4,2,3,0,5];
  let col=null;
  for(const c of prefer){
    if(at(0,c))continue;
    if(G.setupCount.E===2&&!colorOkPlacement("E",c))continue;
    col=c;break;
  }
  if(col===null){for(let c=0;c<6;c++)if(!at(0,c)){col=c;break;}}
  const p=makePiece(type,"E",0,col);
  G.pieces.push(p);
  G.setupCount.E++;
  log(`敵軍：${PIECES[type].name}を配置`,"e");
  sfx("place");
}
function aiSetShield(s){
  const threat=playerThreatMap();
  let best=null,bt=-1;
  for(const [dr,dc] of ORTHO){
    const r=s.r+dr,c=s.c+dc;
    if(!inB(r,c))continue;
    const t=threat[r*6+c]||0;
    if(t>bt){bt=t;best={r,c};}
  }
  if(best){s.flags.block=best;log("敵の盾兵が防御方向を構えた","e");}
}

/* --- 脅威マップ：プレイヤーが次ターンに攻撃できるマスと最大ダメージ --- */
function playerThreatMap(){
  const map={};
  const mark=(r,c,d)=>{if(!inB(r,c))return;const k=r*6+c;if(!map[k]||map[k]<d)map[k]=d;};
  for(const f of alive("P")){
    if(f.flags.invisible)continue; // AIは透明駒を知らない
    const reach=reachSquares(f,f.maxAp,true);
    const dM=atkDamage(f,"melee"),dR=atkDamage(f,"ranged");
    for(const [r,c] of reach){
      if(!PIECES[f.type].noNormal){
        const dirs=f.type==="souhei"?[...DIAG,[frontDr(f.owner),0]]:ORTHO;
        for(const [dr,dc] of dirs)mark(r+dr,c+dc,dM);
      }
      if(f.type==="kyuhei"||f.type==="sogeki"){
        for(const [rr,cc] of rangedCellsFrom(f,r,c))mark(rr,cc,dR);
      }
    }
  }
  return map;
}
/* BFS到達範囲（自駒・敵駒で遮断、色制約は緩く無視可） */
function reachSquares(p,maxSteps,loose){
  const seen=new Set([p.r+","+p.c]);
  const out=[[p.r,p.c]];
  let frontier=[[p.r,p.c]];
  const dirs=moveDirs(p);
  for(let s=0;s<maxSteps;s++){
    const nf=[];
    for(const [r,c] of frontier){
      for(const [dr,dc] of dirs){
        let nr=r+dr,nc=c+dc;
        if(p.type==="boken")nc=(nc+6)%6;
        if(!inB(nr,nc))continue;
        const k=nr+","+nc;
        if(seen.has(k))continue;
        if(visAt(nr,nc,p.owner))continue;
        if(!loose&&!colorOk(p.owner,p.id,nr,nc))continue;
        seen.add(k);nf.push([nr,nc]);out.push([nr,nc]);
      }
    }
    frontier=nf;
  }
  return out;
}
/* BFS（経路つき・色制約あり） */
function reachWithPaths(p){
  const start=p.r+","+p.c;
  const res={[start]:{cost:0,path:[]}};
  let frontier=[[p.r,p.c]];
  const dirs=moveDirs(p);
  for(let s=0;s<p.ap;s++){
    const nf=[];
    for(const [r,c] of frontier){
      const cur=res[r+","+c];
      for(const [dr,dc] of dirs){
        let nr=r+dr,nc=c+dc;
        if(p.type==="boken")nc=(nc+6)%6;
        if(!inB(nr,nc))continue;
        const k=nr+","+nc;
        if(res[k])continue;
        if(visAt(nr,nc,p.owner))continue;
        if(!colorOk(p.owner,p.id,nr,nc))continue;
        res[k]={cost:cur.cost+1,path:[...cur.path,[nr,nc]]};
        nf.push([nr,nc]);
      }
    }
    frontier=nf;
  }
  // 騎馬の跳躍
  if(p.type==="kiba"&&p.ap>=2){
    for(const [dr,dc] of ALL8){
      const mr=p.r+dr,mc=p.c+dc,nr=p.r+dr*2,nc=p.c+dc*2;
      if(!inB(mr,mc)||!inB(nr,nc))continue;
      if(!visAt(mr,mc,p.owner))continue;
      if(visAt(nr,nc,p.owner))continue;
      if(!colorOk(p.owner,p.id,nr,nc))continue;
      const k=nr+","+nc;
      if(!res[k]||res[k].cost>2)res[k]={cost:2,path:[[nr,nc]],jump:true};
    }
  }
  return res;
}

function startAITurn(){
  if(G.over)return;
  G.turn="E";G.phase="action";
  for(const p of alive("E")){
    p.ap=Math.max(0,p.maxAp-(p.flags.apCut?1:0));
    p.flags.apCut=false;
    p.flags.usedFree=false;
  }
  setPhaseBar('<span class="turnE">敵軍の手番 — '+(aiLevel==="max"?"深く思考中…（最強・最大7秒）":"思考中…")+'</span>');
  UI={mode:"ai",sel:null,targets:new Set(),ability:null,extra:{}};
  render();
  setTimeout(()=>{
    let plan;
    if(aiLevel==="max"){
      const res=deepPlan();
      if(res && res.resign && (!res.plan || planIsIdle(res.plan))){
        // どの手も勝率0% → 投了を申請
        offerResignation();
        return;
      }
      plan=res?res.plan:null;
      if(!plan || planIsIdle(plan)){
        // 念のための保険：必ず行動する手を確保
        plan=aiMakePlan();
      }
    }else{
      plan=aiMakePlan();
    }
    aiExecutePlan(plan);
  },650);
}
/* プランが「何もしない（移動なし・攻撃なし・能力なし）」かどうか */
function planIsIdle(plan){
  if(!plan)return true;
  const hasMove=plan.path&&plan.path.length>0;
  return !hasMove && !plan.ability && !plan.attack;
}
/* 投了申請モーダル：プレイヤーが承認すれば敗北として終局、しなければ行動を続行 */
function offerResignation(){
  setPhaseBar('<span class="turnE">敵軍 — 投了を申請しています…</span>');
  openModal("敵軍の投了申請",`
    <p style="text-align:center;line-height:1.7">
      敵軍AIは現局面で<br><b style="color:var(--shu)">勝率0％</b>と判断し、<b>投了</b>を申請しました。</p>
    <p style="text-align:center;color:var(--sub);font-size:13px">
      承認すればあなたの勝利で終局します。<br>承認しない場合、敵軍は最後まで何らかの手を指して抵抗を続けます。</p>
  `,[
    {label:"投了を承認（あなたの勝ち）",cls:"primary",fn:()=>{closeModal();endGame("P");}},
    {label:"承認しない（続行させる）",cls:"",fn:()=>{
      closeModal();
      // 投了を却下 → 必ず何らかの行動を取らせる
      let plan=deepPlan().plan;
      if(!plan||planIsIdle(plan))plan=aiMakePlan();
      if(!plan||planIsIdle(plan)){
        // それでも手がなければ静かにターンを返す
        log("敵軍は抵抗を試みたが、指せる手がなかった","e");
        finishAITurn();return;
      }
      aiExecutePlan(plan);
    }}
  ]);
}
/* 最強モード：探索結果(ssBestMove)を aiExecutePlan が解釈できる形へ変換 */
/* 探索でモデル化済みの能力を持つ駒（これ以外は能力をヒューリスティックで補完） */
const SS_ABILITY_MODELED=new Set(["kyuhei","sogeki","jusoshi"]);
function deepPlan(){
  const res=ssBestMove(aiDepth);
  if(!res||!res.plan)return {plan:null, resign:!!(res&&res.resign)};
  const best=res.plan;
  const p=byId(best.pieceId);
  if(!p)return {plan:null, resign:res.resign};
  // 実際の盤面で目的地までの経路を取得
  const reach=reachWithPaths(p);
  const key=best.destR+","+best.destC;
  let path=[],jump=false;
  if(reach[key]){
    path=reach[key].path||[];
    jump=!!reach[key].jump;
  }else{
    path=[]; // その場 or 経路不能
  }
  let ability=best.ability;
  // 探索が能力をモデル化していない駒は、移動後の局面でヒューリスティックに能力を補完
  if(!ability && !SS_ABILITY_MODELED.has(p.type)){
    ability=heuristicAbilityFor(p, best.destR, best.destC);
  }
  return {plan:{pieceId:best.pieceId, path, jump, ability, attack:best.attack, score:0}, resign:res.resign};
}
/* 指定駒が dest に移動した「と仮定して」最も有効な能力を1つ選ぶ（簡易） */
/* 魔女の入替プラン：味方同士 or 敵同士を入れ替えて最も得をする組を選ぶ */
function witchPlan(witch){
  const eAll=alive("E").filter(p=>p.id!==witch.id);
  const pAll=alive("P").filter(p=>!p.flags.invisible);
  // あるマスがプレイヤーの通常攻撃圏内か（簡易判定）
  const inDanger=(r,c)=>{
    for(const f of pAll){
      const dr=Math.abs(f.r-r), dc=Math.abs(f.c-c), man=dr+dc;
      if(f.flags.noAttack)continue; // 封じ中は脅威が薄い
      if(f.type==="kyuhei"&&man<=2)return true;
      if(f.type==="sogeki"&&dr===dc&&dr<=3)return true;
      if(f.type==="souhei"&&((dr===1&&dc===1)||(dc===0&&dr===1)))return true; // 槍兵：斜め＋正面
      if(man===1)return true; // 通常隣接
    }
    return false;
  };
  const risk=p=>(inDanger(p.r,p.c)?1:0)*(4-p.hp);
  const distTo=(r,c)=>{let m=99;for(const f of pAll)m=Math.min(m,Math.abs(f.r-r)+Math.abs(f.c-c));return m;};
  let best=null,bestGain=0.5; // しきい値：少しでも得なら使う
  // (a) 味方ペア入替：危険な味方を安全マスへ、攻撃役を前へ
  for(let i=0;i<eAll.length;i++)for(let j=i+1;j<eAll.length;j++){
    const a=eAll[i],b=eAll[j];
    const before=risk(a)+risk(b);
    const afterA=(inDanger(b.r,b.c)?1:0)*(4-a.hp);
    const afterB=(inDanger(a.r,a.c)?1:0)*(4-b.hp);
    const after=afterA+afterB;
    const aggrBefore=(SS_ATTACKER.has(a.type)?-distTo(a.r,a.c):0)+(SS_ATTACKER.has(b.type)?-distTo(b.r,b.c):0);
    const aggrAfter =(SS_ATTACKER.has(a.type)?-distTo(b.r,b.c):0)+(SS_ATTACKER.has(b.type)?-distTo(a.r,a.c):0);
    const gain=(before-after)+(aggrAfter-aggrBefore)*0.25;
    if(gain>bestGain){bestGain=gain;best={kind:"swap",aId:a.id,bId:b.id};}
  }
  // (b) 敵ペア入替：瀕死の敵をこちらの攻撃役の隣へ引き出す
  for(let i=0;i<pAll.length;i++)for(let j=i+1;j<pAll.length;j++){
    const a=pAll[i],b=pAll[j];
    const myAtk=eAll.filter(e=>SS_ATTACKER.has(e.type));
    const nearMy=(r,c)=>myAtk.some(e=>Math.abs(e.r-r)+Math.abs(e.c-c)===1);
    const weak=a.hp<=1?a:(b.hp<=1?b:null);
    if(!weak)continue;
    const other=weak===a?b:a;
    if(!nearMy(weak.r,weak.c)&&nearMy(other.r,other.c)){
      const gain=1.2*(2-weak.hp);
      if(gain>bestGain){bestGain=gain;best={kind:"swap",aId:a.id,bId:b.id};}
    }
  }
  return best;
}
const SS_ATTACKER=new Set(["kenshi","senshi","kiba","souhei","kyuketsuki","yusha","ninja"]);

function heuristicAbilityFor(p,dr,dc){
  const foes=alive("P").filter(f=>!f.flags.invisible);
  const allies=alive("E").filter(f=>f.id!==p.id);
  const adj=(r,c)=>ORTHO.some(([a,b])=>r+a===dr&&c+b===dc);
  switch(p.type){
    case "jutsushi":{ // 行動阻害（行0）：最も行動力の高い敵を狙う
      if(!foes.length)return null;
      const t=foes.slice().sort((a,b)=>b.maxAp-a.maxAp)[0];
      return {kind:"slow",targetId:t.id};
    }
    case "akuryo":{ // 攻撃封じ（行0）：最もHPの高い前衛を狙う
      if(!foes.length)return null;
      const t=foes.slice().sort((a,b)=>(b.hp-a.hp)||(Math.abs(b.r-dr)-Math.abs(a.r-dr)))[0];
      return {kind:"bind",targetId:t.id};
    }
    case "kusushi":{ // 薬師：①隣接敵を毒1で倒せるなら最優先 ②瀕死の味方を回復 ③隣接敵に毒
      const adjFoes=foes.filter(f=>Math.abs(f.r-dr)+Math.abs(f.c-dc)===1);
      // ①トドメ：毒1ダメで撃破できる敵（HP<=1。不死鳥の初回復活は考慮）
      const lethal=adjFoes.filter(f=>f.hp<=1&&!(f.type==="fushicho"&&!f.flags.phoenix))
                          .sort((a,b)=>a.hp-b.hp)[0];
      if(lethal)return {kind:"poison",targetId:lethal.id};
      // ②瀕死の味方を回復
      const hurt=allies.filter(a=>a.hp<3&&Math.abs(a.r-dr)+Math.abs(a.c-dc)===1)
                        .sort((a,b)=>a.hp-b.hp)[0];
      if(hurt)return {kind:"heal",targetId:hurt.id};
      // ③それ以外は隣接敵に毒（HPの低い順）
      const en=adjFoes.sort((a,b)=>a.hp-b.hp)[0];
      if(en)return {kind:"poison",targetId:en.id};
      return null;
    }
    case "wanashi":{ // 罠師：移動後の周囲8マスで、敵に最も近い空きマスに罠を設置
      const mine=G.traps.filter(t=>t.setter===p.id).length;
      const cells=ALL8.map(([a,b])=>[dr+a,dc+b])
        .filter(([r,c])=>inB(r,c)&&!at(r,c)&&!G.traps.some(t=>t.r===r&&t.c===c));
      if(!cells.length||!foes.length)return null;
      const distF=(r,c)=>{let m=99;for(const f of foes)m=Math.min(m,Math.abs(f.r-r)+Math.abs(f.c-c));return m;};
      cells.sort((A,B)=>distF(A[0],A[1])-distF(B[0],B[1]));
      const best=cells[0];
      if(distF(best[0],best[1])<=2 || mine<2){
        return {kind:"trap",tr:best[0],tc:best[1]};
      }
      return null;
    }
    case "majo":{ // 魔女：リスク回避 or 有利対面構築のための入替
      return witchPlan(p);
    }
    case "yusha":{ // 勇者：魔王が退場していれば近接特攻はsim側で扱う。ここでは何もしない
      return null;
    }
    default:
      return null; // 罠師/爆弾魔/調教師/軍師/巫女/魔女/超能力者/聖職者/不死鳥 等は移動・通常攻撃で運用
  }
}

/* =========================================================
   最強モード：アルファベータ探索（10手先読み）
   独立した軽量シミュレータ上で手番交代を含む先読みを行う。
   サポート駒：剣士/弓兵/騎馬/戦士/盾兵/狙撃手/吸血鬼/呪詛師
   （AIプール＝この8種なので全手を厳密展開できる）
   ========================================================= */
const SS={ // 静的データ（全24種対応）
  // 通常攻撃を持たない駒
  noNormal:new Set(["kyuhei","sogeki","wanashi","chokyo","miko"]),
  // 遠距離攻撃を「能力」として撃てる駒（探索で展開）
  ranged:new Set(["kyuhei","sogeki"]),
  // 行動力2の駒（騎馬・忍者・冒険者）
  ap2:new Set(["kiba","ninja","boken"]),
};
const SS_MAXAP={kiba:2,ninja:2,boken:2};
function ssClone(st){
  return {
    side:st.side, kP:st.kP, kE:st.kE,
    ps:st.ps.map(p=>({id:p.id,t:p.t,o:p.o,r:p.r,c:p.c,hp:p.hp,
      block:p.block?{r:p.block.r,c:p.block.c}:null,phoenix:p.phoenix,maxAp:p.maxAp,heroBoost:p.heroBoost}))
  };
}
/* 現局面を探索用stateへ変換（プレイヤー手番開始時点を想定） */
function ssFromGame(side){
  const ps=G.pieces.filter(p=>!p.dead).map(p=>({
    id:p.id,t:p.type,o:p.owner,r:p.r,c:p.c,hp:p.hp,
    block:p.flags.block?{r:p.flags.block.r,c:p.flags.block.c}:null,
    phoenix:!!p.flags.phoenix, maxAp:p.maxAp, heroBoost:!!p.flags.heroBoost
  }));
  return {side, kP:G.kills.P, kE:G.kills.E, ps};
}
const ssAt=(st,r,c)=>st.ps.find(p=>p.r===r&&p.c===c);
function ssMoveDirs(t){ return (t==="kiba"||t==="ninja")?ALL8:ORTHO; }
function ssColorOk(st,p,nr,nc){
  // 自陣3駒が同じ色の陣に偏ってはいけない（列0-2:左 / 3-5:右）
  const half=c=>c<3?0:1;
  const h=half(nc);
  let same=1;
  for(const q of st.ps){ if(q.o===p.o&&q.id!==p.id&&half(q.c)===h) same++; }
  return same<3;
}
function ssAtk(p,kind){
  let d=1;
  if(p.t==="kenshi")d+=0.5;
  if(p.t==="senshi"){if(p.hp<=1)d+=2;else if(p.hp<=2)d+=1;}
  if(p.t==="yusha"&&p.heroBoost&&kind==="melee")d=3;
  return d;
}
function ssRangedCells(p,r,c){
  const out=[];
  if(p.t==="kyuhei"){
    for(const [dr,dc] of ORTHO){out.push([r+dr,c+dc]);out.push([r+dr*2,c+dc*2]);}
    for(const [dr,dc] of DIAG)out.push([r+dr,c+dc]);
  }else if(p.t==="sogeki"){
    for(const [dr,dc] of DIAG)for(let k=1;k<=3;k++)out.push([r+dr*k,c+dc*k]);
  }
  return out.filter(([rr,cc])=>inB(rr,cc));
}
function ssNormalCells(p){
  if(SS.noNormal.has(p.t))return [];
  let dirs;
  if(p.t==="souhei")dirs=[...DIAG,[frontDr(p.o),0]];
  else dirs=ORTHO;
  return dirs.map(([dr,dc])=>[p.r+dr,p.c+dc]).filter(([r,c])=>inB(r,c));
}
/* ダメージ適用（撃破・不死鳥・吸血を処理）。撃破イベントを返す */
function ssDealDamage(st,attacker,target,kind){
  if(target.block&&attacker&&attacker.r===target.block.r&&attacker.c===target.block.c)return;
  let d=ssAtk(attacker,kind);
  let killed=target.hp-d<=0;
  if(killed&&target.t==="fushicho"&&!target.phoenix){
    target.phoenix=true;target.hp=0.5;killed=false;
  }else{
    target.hp=r2(target.hp-d);
  }
  if(attacker.t==="kyuketsuki"&&kind==="melee"&&attacker.hp<3){
    attacker.hp=r2(Math.min(3,attacker.hp+0.5));
  }
  if(killed){
    target.dead=true;
    if(target.o==="P")st.kE++; else st.kP++;
  }
}
function ssRemoveDead(st){ st.ps=st.ps.filter(p=>!p.dead); }
function ssTerminal(st){ return st.kP>=2||st.kE>=2; }

/* 1手番ぶんの合法手を列挙（移動+能力、その後ベスト通常攻撃を自動付与）
   戻り値：適用後stateの配列。手番側=st.side */
function ssGenerate(st){
  const side=st.side;
  const mine=st.ps.filter(p=>p.o===side);
  const out=[];
  const pushState=(ns)=>{
    // 手番内のベスト通常攻撃を1回付与
    ssBestAttack(ns,side);
    ssRemoveDead(ns);
    ns.side=(side==="P")?"E":"P";
    out.push(ns);
  };
  for(const p of mine){
    // 到達マス（BFS, 色制約あり）
    const dests=ssReach(st,p);
    for(const d of dests){
      // 移動のみ
      const ns=ssClone(st);
      const np=ns.ps.find(x=>x.id===p.id);
      np.r=d.r;np.c=d.c;
      pushState(ns);
      // 遠距離（弓兵・狙撃）：移動後に残APがあれば
      if(SS.ranged.has(p.t)&&d.apLeft>=1){
        const cells=ssRangedCells(np,d.r,d.c);
        for(const [rr,cc] of cells){
          const t=ssAt(ns,rr,cc);
          if(t&&t.o!==side&&!(t.block)){
            const ns2=ssClone(st);
            const a2=ns2.ps.find(x=>x.id===p.id); a2.r=d.r;a2.c=d.c;
            const t2=ns2.ps.find(x=>x.r===rr&&x.c===cc&&x.o!==side);
            if(t2)ssDealDamage(ns2,a2,t2,"ranged");
            pushState(ns2);
          }
        }
      }
      // 呪詛師：その場（cost0）で全体-0.5（HP>=1.5、自壊すれば相手の勝ち点）
      if(p.t==="jusoshi"&&d.cost===0&&np.hp>=1.5){
        const ns3=ssClone(st);
        const a3=ns3.ps.find(x=>x.id===p.id);
        for(const t of ns3.ps.filter(x=>x.o!==side)){
          let killed=t.hp-0.5<=0;
          if(killed&&t.t==="fushicho"&&!t.phoenix){t.phoenix=true;t.hp=0.5;killed=false;}
          else t.hp=r2(t.hp-0.5);
          if(killed){t.dead=true;if(t.o==="P")ns3.kE++;else ns3.kP++;}
        }
        a3.hp=r2(a3.hp-1.5);
        if(a3.hp<=0){a3.dead=true;if(a3.o==="P")ns3.kE++;else ns3.kP++;}
        pushState(ns3);
      }
    }
  }
  if(out.length===0){ // 手詰まり：パス
    const ns=ssClone(st);ssBestAttack(ns,side);ssRemoveDead(ns);
    ns.side=(side==="P")?"E":"P";out.push(ns);
  }
  return out;
}
/* BFS到達（color制約・遮断あり）→ {r,c,cost,apLeft} */
function ssReach(st,p){
  const res={[p.r+","+p.c]:{cost:0}};
  let frontier=[{r:p.r,c:p.c}];
  const dirs=ssMoveDirs(p.t);
  const occupied=(r,c)=>st.ps.some(q=>q.id!==p.id&&q.r===r&&q.c===c);
  for(let s=0;s<p.maxAp;s++){
    const nf=[];
    for(const cur of frontier){
      for(const [dr,dc] of dirs){
        let nr=cur.r+dr,nc=cur.c+dc;
        if(p.t==="boken")nc=(nc+6)%6; // 冒険者：左右ループ
        if(!inB(nr,nc))continue;
        const k=nr+","+nc;
        if(res[k])continue;
        if(occupied(nr,nc))continue;
        if(!ssColorOk(st,p,nr,nc))continue;
        res[k]={cost:res[cur.r+","+cur.c].cost+1};
        nf.push({r:nr,c:nc});
      }
    }
    frontier=nf;
  }
  // 騎馬跳躍
  if(p.t==="kiba"&&p.maxAp>=2){
    for(const [dr,dc] of ALL8){
      const mr=p.r+dr,mc=p.c+dc,nr=p.r+dr*2,nc=p.c+dc*2;
      if(!inB(mr,mc)||!inB(nr,nc))continue;
      if(!occupied(mr,mc))continue;
      if(occupied(nr,nc))continue;
      if(!ssColorOk(st,p,nr,nc))continue;
      const k=nr+","+nc;
      if(!res[k]||res[k].cost>2)res[k]={cost:2};
    }
  }
  return Object.keys(res).map(k=>{
    const [r,c]=k.split(",").map(Number);
    return {r,c,cost:res[k].cost,apLeft:p.maxAp-res[k].cost};
  });
}
/* 手番側のベスト通常攻撃を1回だけ適用 */
function ssBestAttack(st,side){
  let best=null,bs=-1;
  for(const a of st.ps.filter(x=>x.o===side&&!SS.noNormal.has(x.t))){
    for(const [r,c] of ssNormalCells(a)){
      const t=st.ps.find(x=>x.r===r&&x.c===c&&x.o!==side);
      if(!t)continue;
      if(t.block&&a.r===t.block.r&&a.c===t.block.c)continue;
      const d=ssAtk(a,"melee");
      const kills=t.hp-d<=0&&!(t.t==="fushicho"&&!t.phoenix);
      const s=(kills?1000:0)+d*200+(3-Math.max(0,t.hp-d))*40;
      if(s>bs){bs=s;best={a,t};}
    }
  }
  if(best)ssDealDamage(st,best.a,best.t,"melee");
}

/* 静的評価（E視点：高いほどEに有利） */
function ssEval(st){
  if(st.kE>=2)return 1e7;
  if(st.kP>=2)return -1e7;
  let v=(st.kE-st.kP)*5000;
  const eP=st.ps.filter(p=>p.o==="E"), pP=st.ps.filter(p=>p.o==="P");
  // 駒の存在＋HP総量（E加点・P減点）
  for(const p of eP)v+=120+p.hp*80;
  for(const p of pP)v-=120+p.hp*80;
  // 攻め圧：相手への最短マンハッタン距離が近い駒ほど主導権
  const dist=(a,arr)=>{let m=99;for(const b of arr)m=Math.min(m,Math.abs(a.r-b.r)+Math.abs(a.c-b.c));return m;};
  for(const p of eP){ if(pP.length)v-=dist(p,pP)*10; }
  for(const p of pP){ if(eP.length)v+=dist(p,eP)*6; }
  // 瀕死の相手は仕留めやすい→僅かに加点
  for(const p of pP)if(p.hp<=1)v+=60;
  for(const p of eP)if(p.hp<=1)v-=60;
  // --- プレイヤーの術士／悪霊の妨害リスクを考慮 ---
  // 術士が生存していれば、AIの主力（行動力2や高HP前衛）が次手番に減速される恐れ→過度な突出を割り引く
  const pJutsu=pP.some(p=>p.t==="jutsushi");
  const pAkuryo=pP.some(p=>p.t==="akuryo");
  if(pJutsu){
    for(const p of eP){
      // 行動力2の駒や、相手陣に踏み込んだ駒ほど減速の影響が大きい
      const exposure=(p.maxAp>=2?1.4:1.0)*Math.max(0,(4-dist(p,pP)));
      v-=exposure*9;
    }
  }
  if(pAkuryo){
    for(const p of eP){
      // 通常攻撃役（近接アタッカー）が封じられると痛い→相手に密着しすぎる前衛を割り引く
      if(!SS.noNormal.has(p.t)){
        const exposure=Math.max(0,(3-dist(p,pP)));
        v-=exposure*8;
      }
    }
  }
  return v;
}

/* negamax + alpha-beta。時間制限・ノード上限つき */
let ssNodes=0, ssDeadline=0, ssAbort=false;
const SS_NODE_CAP=2600000;
function ssSearch(st,depth,alpha,beta){
  if(ssAbort)return ssEval(st);
  if(ssTerminal(st)||depth<=0){
    return ssEval(st);
  }
  if((++ssNodes&1023)===0){
    if(ssNodes>SS_NODE_CAP||performance.now()>ssDeadline){ssAbort=true;return ssEval(st);}
  }
  let children=ssGenerate(st);
  // ムーブオーダリング＆幅制限（深いほど狭く）
  const width=depth>=6?10:depth>=3?12:16;
  if(children.length>width){
    children.sort((a,b)=> (st.side==="E"? ssEval(b)-ssEval(a) : ssEval(a)-ssEval(b)) );
    children=children.slice(0,width);
  }
  if(st.side==="E"){
    let best=-Infinity;
    for(const ch of children){
      const v=ssSearch(ch,depth-1,alpha,beta);
      if(v>best)best=v;
      if(best>alpha)alpha=best;
      if(alpha>=beta)break;
      if(ssAbort)break;
    }
    return best;
  }else{
    let best=Infinity;
    for(const ch of children){
      const v=ssSearch(ch,depth-1,alpha,beta);
      if(v<best)best=v;
      if(best<beta)beta=best;
      if(alpha>=beta)break;
      if(ssAbort)break;
    }
    return best;
  }
}
/* 最善のE手番を選ぶ。反復深化で目標プライまで、時間予算内で深掘り */
function ssBestMove(maxDepth){
  const root=ssFromGame("E");
  const side="E";
  const mine=root.ps.filter(p=>p.o===side);
  // ルート手の列挙（実行可能プランを保持）
  const rootMoves=[];
  for(const p of mine){
    const dests=ssReach(root,p);
    for(const d of dests){
      rootMoves.push({pieceId:p.id,dr:d.r,dc:d.c,cost:d.cost,apLeft:d.apLeft,ability:null});
      if(SS.ranged.has(p.t)&&d.apLeft>=1){
        const np={...p,r:d.r,c:d.c};
        for(const [rr,cc] of ssRangedCells(np,d.r,d.c)){
          const t=ssAt(root,rr,cc);
          if(t&&t.o!==side&&!t.block)rootMoves.push({pieceId:p.id,dr:d.r,dc:d.c,cost:d.cost,apLeft:d.apLeft,ability:{kind:"ranged",tr:rr,tc:cc}});
        }
      }
      if(p.t==="jusoshi"&&d.cost===0&&p.hp>=1.5){
        rootMoves.push({pieceId:p.id,dr:d.r,dc:d.c,cost:0,apLeft:d.apLeft,ability:{kind:"curse"}});
      }
    }
  }
  if(rootMoves.length===0)return {resign:false, plan:null, allLose:false};

  // 各ルート手を適用した「子state」と実行用メタを事前生成
  const applied=rootMoves.map(mv=>{
    const ns=ssClone(root);
    const np=ns.ps.find(x=>x.id===mv.pieceId);
    const origin=root.ps.find(x=>x.id===mv.pieceId);
    np.r=mv.dr;np.c=mv.dc;
    if(mv.ability&&mv.ability.kind==="ranged"){
      const t=ns.ps.find(x=>x.r===mv.ability.tr&&x.c===mv.ability.tc&&x.o!=="E");
      if(t)ssDealDamage(ns,np,t,"ranged");
    }else if(mv.ability&&mv.ability.kind==="curse"){
      for(const t of ns.ps.filter(x=>x.o!=="E")){
        let killed=t.hp-0.5<=0;
        if(killed&&t.t==="fushicho"&&!t.phoenix){t.phoenix=true;t.hp=0.5;killed=false;}
        else t.hp=r2(t.hp-0.5);
        if(killed){t.dead=true;ns.kP++;}
      }
      np.hp=r2(np.hp-1.5);
      if(np.hp<=0){np.dead=true;ns.kP++;}
    }
    const atk=ssBestAttackPlan(ns,"E");
    ssRemoveDead(ns);
    ns.side="P";
    const jump=(np.t==="kiba"&&mv.cost===2&&(Math.abs(mv.dr-origin.r)+Math.abs(mv.dc-origin.c))>1);
    // 移動・攻撃・能力のいずれかを伴う「実質的な行動」かどうか
    const moved=(mv.dr!==origin.r||mv.dc!==origin.c);
    const acts=moved||!!mv.ability||!!atk;
    return {state:ns, acts, plan:{pieceId:mv.pieceId,destR:mv.dr,destC:mv.dc,cost:mv.cost,jump,ability:mv.ability,attack:atk}};
  });

  // --- 即時フォールバック：浅い静的評価で必ず「行動を伴う」最善手を確保 ---
  // （深い探索が時間切れでも、何もしない手には絶対に落ちないようにする）
  let fbBest=-Infinity, fbPlan=null;
  for(const a of applied){
    if(!a.acts)continue; // 「何もしない」候補は除外
    const v=ssEval(a.state)+Math.random()*2;
    if(v>fbBest){fbBest=v;fbPlan=a.plan;}
  }
  // 行動を伴う候補が皆無なら（理論上ほぼ無い）行動なしでも最善を取る
  if(!fbPlan){
    for(const a of applied){const v=ssEval(a.state);if(v>fbBest){fbBest=v;fbPlan=a.plan;}}
  }

  ssDeadline=performance.now()+6500; // 最大約6.5秒の思考予算（上限7秒）
  let bestPlan=fbPlan;        // ★初期値を「何もしない」ではなく浅い最善手に
  let bestVal=fbBest;
  let order=applied.map((_,i)=>i);
  const valById={};          // 各ルート手の最深評価値を記録（投了判定用）

  for(let depth=2; depth<=maxDepth; depth++){
    ssAbort=false; ssNodes=0;
    let localBest=-Infinity, localPlan=null;
    const scored=[];
    let completedAny=false;
    for(const idx of order){
      const node=applied[idx];
      const v=ssSearch(node.state, depth-1, -Infinity, Infinity);
      if(ssAbort){break;} // この手は読み切れていない → 記録しない
      completedAny=true;
      scored.push({idx,v});
      valById[idx]=v;
      // 「行動を伴う手」を優先採用（同評価なら行動ありを選ぶ）
      const better = v>localBest+1e-9 || (Math.abs(v-localBest)<=1e-9 && node.acts);
      if(localPlan===null || better){
        if(node.acts || localPlan===null){ localBest=v; localPlan=node.plan; }
      }
    }
    if(completedAny && localPlan){
      bestPlan=localPlan; bestVal=localBest;
      scored.sort((a,b)=>b.v-a.v);
      order=scored.map(s=>s.idx).concat(order.filter(i=>!scored.find(s=>s.idx===i)));
      if(localBest>=1e6)break; // 勝ち確定
    }
    if(performance.now()>ssDeadline)break;
  }

  // --- 投了判定：読み切れた全候補が「敗北確定（-1e6以下）」なら勝率0% ---
  const evaluated=Object.values(valById);
  const allLose = evaluated.length>0 && evaluated.every(v=>v<=-1e6);

  return {resign:allLose, plan:bestPlan, allLose};
}
/* ベスト通常攻撃のプランを返す（state適用も行う） */
function ssBestAttackPlan(st,side){
  let best=null,bs=-1;
  for(const a of st.ps.filter(x=>x.o===side&&!SS.noNormal.has(x.t))){
    for(const [r,c] of ssNormalCells(a)){
      const t=st.ps.find(x=>x.r===r&&x.c===c&&x.o!==side);
      if(!t)continue;
      if(t.block&&a.r===t.block.r&&a.c===t.block.c)continue;
      const d=ssAtk(a,"melee");
      const kills=t.hp-d<=0&&!(t.t==="fushicho"&&!t.phoenix);
      const s=(kills?1000:0)+d*200+(3-Math.max(0,t.hp-d))*40;
      if(s>bs){bs=s;best={a,t};}
    }
  }
  if(best){
    const aid=best.a.id,tid=best.t.id;
    ssDealDamage(st,best.a,best.t,"melee");
    return {attackerId:aid,targetId:tid};
  }
  return null;
}

function aiMakePlan(){
  const threat=playerThreatMap();
  const foes=alive("P").filter(f=>!f.flags.invisible);
  const myList=alive("E");
  const cands=[];

  const baseSim=()=>G.pieces.filter(p=>!p.dead).map(p=>({
    id:p.id,type:p.type,owner:p.owner,r:p.r,c:p.c,hp:p.hp,
    block:p.flags.block,phoenix:p.flags.phoenix,noAttack:p.flags.noAttack,
    invisible:p.flags.invisible,heroBoost:p.flags.heroBoost
  }));

  function simAtkDamage(sp,kind){
    let d=1;
    if(sp.type==="kenshi")d+=0.5;
    if(sp.type==="senshi"){if(sp.hp<=1)d+=2;else if(sp.hp<=2)d+=1;}
    if(sp.type==="yusha"&&sp.heroBoost&&kind==="melee")d=3;
    return d;
  }
  function simHit(sim,attacker,target,kind,events){
    if(target.invisible)return;
    if(target.block&&attacker&&attacker.r===target.block.r&&attacker.c===target.block.c)return;
    const d=simAtkDamage(attacker,kind);
    let eff=d;
    let killed=target.hp-d<=0;
    if(killed&&target.type==="fushicho"&&!target.phoenix){killed=false;target.hp=0.5;eff=d;}
    else target.hp=r2(target.hp-d);
    events.push({dmg:eff,killed,tHp:Math.max(0,target.hp),tType:target.type});
    if(killed)target.dead=true;
  }

  function evalPlan(mover,dest,apAfter,ability){
    const sim=baseSim();
    const sm=sim.find(x=>x.id===mover.id);
    sm.r=dest.r;sm.c=dest.c;
    const events=[];
    // ability
    if(ability&&ability.kind==="ranged"){
      const t=sim.find(x=>x.id===ability.targetId&&!x.dead);
      if(t)simHit(sim,sm,t,"ranged",events);
    }
    if(ability&&ability.kind==="curse"){
      sm.hp=r2(sm.hp-1.5);
      for(const t of sim.filter(x=>x.owner==="P"&&!x.dead&&!x.invisible)){
        let killed=t.hp-0.5<=0;
        if(killed&&t.type==="fushicho"&&!t.phoenix){killed=false;t.hp=0.5;}
        else t.hp=r2(t.hp-0.5);
        events.push({dmg:0.5,killed,tHp:Math.max(0,t.hp),tType:t.type});
        if(killed)t.dead=true;
      }
    }
    // best normal attack（駒1体で1回）
    let bestAtk=null,bestAtkScore=-1;
    for(const a of sim.filter(x=>x.owner==="E"&&!x.dead&&!x.noAttack&&!x.invisible)){
      if(PIECES[a.type].noNormal)continue;
      const dirs=a.type==="souhei"?[...DIAG,[1,0]]:ORTHO;
      for(const [dr,dc] of dirs){
        const t=sim.find(x=>!x.dead&&x.owner==="P"&&!x.invisible&&x.r===a.r+dr&&x.c===a.c+dc);
        if(!t)continue;
        const d=simAtkDamage(a,"melee");
        let kills=t.hp-d<=0&&!(t.type==="fushicho"&&!t.phoenix);
        const s=(kills?900:0)+d*200+d*(3-Math.max(0,t.hp-d))*30;
        if(t.block&&a.r===t.block.r&&a.c===t.block.c)continue;
        if(s>bestAtkScore){bestAtkScore=s;bestAtk={attackerId:a.id,targetId:t.id};}
      }
    }
    if(bestAtk){
      const a=sim.find(x=>x.id===bestAtk.attackerId);
      const t=sim.find(x=>x.id===bestAtk.targetId);
      if(a&&t&&!t.dead)simHit(sim,a,t,"melee",events);
    }
    // score
    let score=0,killsNow=G.kills.E;
    for(const e of events){
      if(e.killed&&e.tType!=="kemono"){
        killsNow++;score+=900;
        if(killsNow>=2)score+=100000;
      }else if(e.killed){score+=350;}
      else score+=e.dmg*230+e.dmg*(3-e.tHp)*45;
    }
    // 被脅威
    const risks=[];
    for(const m of sim.filter(x=>x.owner==="E"&&!x.dead)){
      const t=threat[m.r*6+m.c]||0;
      if(t<=0)continue;
      if(t>=m.hp)risks.push(820+(G.kills.P>=1?500:0));
      else risks.push(t*55);
    }
    risks.sort((a,b)=>b-a);
    if(killsNow<2){
      if(risks.length)score-=risks[0];
      for(let i=1;i<risks.length;i++)score-=risks[i]*0.3;
    }
    // 接近・位置
    for(const m of sim.filter(x=>x.owner==="E"&&!x.dead)){
      let md=99;
      for(const f of sim.filter(x=>x.owner==="P"&&!x.dead&&!x.invisible)){
        md=Math.min(md,Math.abs(m.r-f.r)+Math.abs(m.c-f.c));
      }
      if(md<99)score-=md*13;
    }
    score+=Math.random()*8;
    return {score,attack:bestAtk};
  }

  for(const p of myList){
    const reach=reachWithPaths(p);
    for(const key in reach){
      const [r,c]=key.split(",").map(Number);
      const info=reach[key];
      const apAfter=p.ap-info.cost;
      const tryC=(ability)=>{
        const ev=evalPlan(p,{r,c},apAfter,ability);
        cands.push({score:ev.score,pieceId:p.id,path:info.path,jump:info.jump,
                    ability,attack:ev.attack});
      };
      tryC(null);
      if((p.type==="kyuhei"||p.type==="sogeki")&&apAfter>=1){
        for(const [rr,cc] of rangedCellsFrom(p,r,c)){
          const t=foes.find(f=>f.r===rr&&f.c===cc);
          if(t)tryC({kind:"ranged",targetId:t.id});
        }
      }
      if(p.type==="jusoshi"&&p.hp>=1.5&&info.cost===0){
        tryC({kind:"curse"});
      }
    }
  }
  cands.sort((a,b)=>b.score-a.score);
  if(cands.length===0)return null;
  // 行動必須ルール：移動も能力もない候補は、他に選択肢がない場合のみ許可
  const acting=cands.filter(c=>(c.path&&c.path.length>0)||c.ability);
  const pool=acting.length?acting:cands;
  if(aiLevel==="hard")return pool[0];
  // ふつう：上位の中からランダム
  const top=pool.filter(c=>c.score>=pool[0].score*0.8||pool.indexOf(c)<4);
  return top[Math.floor(Math.random()*Math.min(top.length,4))];
}

function aiExecutePlan(plan){
  const steps=[];
  if(plan){
    const p=byId(plan.pieceId);
    if(p){
      if(plan.jump&&plan.path.length){
        const [r,c]=plan.path[plan.path.length-1];
        steps.push(()=>{
          if(p.dead||p.ap<2)return;
          p.ap-=2;
          log("敵の騎馬が跳躍した！","e");
          enterSquare(p,r,c);sfx("move");
        });
      }else{
        for(const [r,c] of plan.path){
          steps.push(()=>{
            if(p.dead||p.ap<1)return;
            if(visAt(r,c,"E"))return;
            tryStep(p,r,c);
          });
        }
      }
      if(plan.ability){
        if(plan.ability.kind==="ranged"){
          steps.push(()=>{
            if(p.dead||p.ap<1)return;
            let t=plan.ability.targetId?byId(plan.ability.targetId):null;
            if(!t&&plan.ability.tr!=null)t=visAt(plan.ability.tr,plan.ability.tc,"E");
            if(!t||t.flags.invisible||t.owner!=="P")return;
            if(!rangedCellsFrom(p,p.r,p.c).some(([r,c])=>r===t.r&&c===t.c))return;
            p.ap--;
            performAttack(p,t,"ranged");
          });
        }else if(plan.ability.kind==="curse"){
          steps.push(()=>{
            if(p.dead||p.hp<1.5)return;
            log("敵の呪詛師が呪いを放った！（敵全体HP-0.5）","e");
            for(const t of alive("P"))dealDamage(t,0.5,null,"curse");
            p.hp=r2(p.hp-1.5);
            if(p.hp<=0 && !p.dead) killPiece(p,null,"curse");
          });
        }else if(plan.ability.kind==="slow"){
          steps.push(()=>{
            if(p.dead||p.flags.usedFree)return;
            const t=byId(plan.ability.targetId);
            if(!t||t.flags.invisible||t.owner!=="P")return;
            p.flags.usedFree=true;t.flags.apCut=true;
            log(`敵の術士の呪い…${pieceLabel(t)}の次ターン行動力-1`,"e");sfx("pick");
          });
        }else if(plan.ability.kind==="bind"){
          steps.push(()=>{
            if(p.dead||p.flags.usedFree)return;
            const t=byId(plan.ability.targetId);
            if(!t||t.flags.invisible||t.owner!=="P")return;
            p.flags.usedFree=true;t.flags.noAttack=true;
            log(`敵の悪霊が取り憑いた…${pieceLabel(t)}は次の手番、通常攻撃不可`,"e");sfx("pick");
          });
        }else if(plan.ability.kind==="heal"){
          steps.push(()=>{
            if(p.dead||p.ap<1||p.flags.healUsed)return;
            const t=byId(plan.ability.targetId);
            if(!t||t.owner!=="E"||Math.abs(t.r-p.r)+Math.abs(t.c-p.c)!==1)return;
            p.ap--;p.flags.healUsed=true;
            healPiece(t,1);
            log(`敵の薬師が${pieceLabel(t)}を癒した`,"e");sfx("heal");
          });
        }else if(plan.ability.kind==="swap"){
          steps.push(()=>{
            if(p.dead||p.ap<1)return;
            const a=byId(plan.ability.aId), b=byId(plan.ability.bId);
            if(!a||!b||a.owner!==b.owner)return;
            if((a.flags.invisible&&a.owner!=="E")||(b.flags.invisible&&b.owner!=="E"))return;
            p.ap--;
            const ar=a.r,ac=a.c; a.r=b.r;a.c=b.c; b.r=ar;b.c=ac;
            log(`敵の魔女の入替魔法！${PIECES[a.type].name}と${PIECES[b.type].name}が入れ替わった`,"e");
            sfx("move");
          });
        }else if(plan.ability.kind==="poison"){
          steps.push(()=>{
            if(p.dead||p.ap<1||p.flags.healUsed)return;
            const t=byId(plan.ability.targetId);
            if(!t||t.owner!=="P"||t.flags.invisible||Math.abs(t.r-p.r)+Math.abs(t.c-p.c)!==1)return;
            p.ap--;p.flags.healUsed=true;
            dealDamage(t,1,p,"poison");
            log(`敵の薬師が${pieceLabel(t)}に毒を盛った`,"e");sfx("hit");
          });
        }else if(plan.ability.kind==="trap"){
          steps.push(()=>{
            if(p.dead||p.ap<1)return;
            const {tr,tc}=plan.ability;
            if(!inB(tr,tc)||at(tr,tc)||G.traps.some(t=>t.r===tr&&t.c===tc))return;
            p.ap--;
            const mine=G.traps.filter(t=>t.setter===p.id);
            if(mine.length>=2){const idx=G.traps.indexOf(mine[0]);if(idx>=0)G.traps.splice(idx,1);}
            G.traps.push({owner:"E",r:tr,c:tc,setter:p.id});
            log("敵の罠師が罠を仕掛けた","e");sfx("pick");
          });
        }
      }
    }
    if(plan.attack){
      steps.push(()=>{
        const a=byId(plan.attack.attackerId);
        let t=byId(plan.attack.targetId);
        if(!a||a.flags.noAttack)return;
        // 予定ターゲットが消えていたら隣接の敵を再探索
        const cellOk=t&&!t.flags.invisible&&normalAttackCells(a).some(([r,c])=>r===t.r&&c===t.c);
        if(!cellOk){
          t=null;
          for(const [r,c] of normalAttackCells(a)){
            const x=visAt(r,c,"E");
            if(x&&x.owner==="P"){t=x;break;}
          }
        }
        if(t)performAttack(a,t,"melee");
      });
    }
  }
  steps.push(()=>{});
  let i=0;
  const run=()=>{
    if(G.over)return;
    if(G.respawnQueue.length){processRespawns(run);return;}
    if(i>=steps.length){finishAITurn();return;}
    const f=steps[i++];
    f();
    render();
    setTimeout(run,430);
  };
  run();
}
function finishAITurn(){
  if(G.over)return;
  shieldPhase("E",()=>{
    explodeBombs("E",()=>{
      if(G.over)return;
      for(const p of alive("P"))p.flags.invisible=false;
      for(const p of alive("E"))p.flags.noAttack=false;
      setTimeout(startPlayerTurn,400);
    });
  });
}

      const wrap=document.createElement("div");wrap.className="abilBtns";
      for(const b of btns){
        const bb=document.createElement("button");
        bb.className="act";bb.textContent=b.label;bb.disabled=!b.enabled;
        bb.onclick=b.fn;
        wrap.appendChild(bb);
      }
      el.appendChild(wrap);
    }
  }
  if(UI.mode==="ability"){
    const note=document.createElement("div");
    note.style.cssText="margin-top:6px;color:var(--gold);font-size:12px";
    note.textContent="光っているマス／駒を選択してください（盤外をタップでキャンセル）";
    el.appendChild(note);
  }
}

/* =========================================================
   モーダル
   ========================================================= */
function openModal(title,bodyHtml,buttons){
  $("#modalTitle").textContent=title;
  $("#modalBody").innerHTML=bodyHtml;
  const bt=$("#modalBtns");bt.innerHTML="";
  for(const b of buttons||[]){
    const e=document.createElement("button");
    e.className="act"+(b.cls?" "+b.cls:"");
    e.textContent=b.label;e.onclick=b.fn;
    bt.appendChild(e);
  }
  $("#modalBack").classList.remove("hidden");
}
function closeModal(){$("#modalBack").classList.add("hidden");}
let pickerArgs=null;
function openPiecePicker(title,cb){
  pickerArgs={title,cb};
  let html='<div class="pickGrid">';
  for(const t of PICKABLE){
    const I=PIECES[t];
    html+=`<div class="pCard" data-t="${t}">
      <div class="t"><span class="nm">${I.name}</span><span class="ap">行動力${I.ap}</span></div>
      <div class="d">${I.desc}</div></div>`;
  }
  html+="</div>";
  openModal(title,html,[{label:"盤面を確認する",fn:()=>{closeModal();showPeekBack();}}]);
  $("#modalBody").querySelectorAll(".pCard").forEach(card=>{
    card.onclick=()=>{sfx("pick");pickerArgs=null;hidePeekBack();closeModal();cb(card.dataset.t);};
  });
}
function showPeekBack(){
  hidePeekBack();
  const b=document.createElement("button");
  b.id="peekBack";b.className="act primary";b.textContent="▲ 駒の選択に戻る";
  b.onclick=()=>{hidePeekBack();if(pickerArgs)openPiecePicker(pickerArgs.title,pickerArgs.cb);};
  document.body.appendChild(b);
}
function hidePeekBack(){
  const b=document.getElementById("peekBack");
  if(b)b.remove();
}

function showHelp(){
  let rows="";
  for(const t of PICKABLE){
    const I=PIECES[t];
    rows+=`<tr><th>${I.name}<br><small style="color:var(--sub)">行${I.ap}</small></th><td>${I.desc}</td></tr>`;
  }
  openModal("ルール",`
   <div class="ruleSec"><h3>勝利条件</h3><p>相手の駒を<b>2つ</b>倒したら勝利。駒は倒されると即座に新しい駒を手前の段に召喚できます（種類変更可）。</p></div>
   <div class="ruleSec"><h3>盤面と色の制約</h3><p>6×6の盤は左右で色が分かれています。<b>自分の主力3駒が同じ色の陣に全て揃う配置・移動は禁止</b>です。</p></div>
   <div class="ruleSec"><h3>ターンの流れ</h3><p>① 行動フェーズ：<b>必ず駒1体を選び、行動力を消費して</b>移動（1マス=行動力1）や能力使用を行います（行動できる駒が1体もいない場合のみスキップ可）。<br>② 攻撃フェーズ：駒1体（移動した駒以外でも可）で通常攻撃。基本は縦横の隣接マスに1ダメージ。<br>③ ターンエンド。全駒HP3、HP0以下で撃破。</p></div>
   <div class="ruleSec"><h3>駒一覧（全24種）</h3><table>${rows}</table></div>
   <div class="ruleSec"><h3>このアプリでの裁定メモ</h3>
     <p>・行動フェーズでは選んだ駒の行動力をすべて消費するまで攻撃フェーズに進めません（移動先や能力対象が一切ない場合を除く）。<br>・射程内に敵がいない遠距離攻撃など、対象のない能力は使用できません。<br>・敵の駒をタップすると効果を確認できます。<br>・術士／悪霊の能力は行動力0で使用できます（毎ターン1回）。残った行動力は移動か「待機」で消費します。<br>・薬師の調合と聖職者の祈祷は各1回限り。<br>・勇者は再召喚時にも魔王を指定できます。<br>・盾兵の防御指定は毎ターン攻撃フェーズ後に変更可（縦横4マスから選択）。<br>・移動と能力は行動力の範囲で同一ターンに併用できます。</p></div>
  `,[{label:"閉じる",cls:"primary",fn:closeModal}]);
}

function showStart(){
  cleanupNet();
  openModal("攻 城 戦",`
    <p style="text-align:center;letter-spacing:.1em;color:#d9cdb2">三つの駒で戦場へ。<br>敵の駒を二つ討ち取れば勝利。</p>
    <label id="randomDealToggle" style="display:flex;align-items:center;justify-content:center;gap:8px;
      margin:4px 0 10px;padding:8px;background:var(--panel2);border-radius:8px;cursor:pointer;font-size:14px">
      <input type="checkbox" id="rndChk" style="width:18px;height:18px">
      <span>🎲 ランダム配布モード（両者の駒3つを完全ランダムで配布）</span>
    </label>
    <div class="ruleSec"><h3>ソロプレイ（AI対戦）</h3>
      <div class="choiceList">
        <button class="act" id="lvNormal">ふつう — 時々ゆるい手を指す</button>
        <button class="act" id="lvHard">つよい — 常に最善の1手</button>
        <button class="act" id="lvMax">★最強★ — 10手先を読む深層思考</button>
      </div>
    </div>
    <div class="ruleSec"><h3>オンライン対戦（ルームコード）</h3>
      <div class="choiceList">
        <button class="act primary" id="btnHost">ルームを作る — コードを発行</button>
        <button class="act primary" id="btnJoin">ルームに参加 — コードを入力</button>
      </div>
      <p style="color:var(--sub);font-size:12px;margin:6px 0 0">同じコードを入力した相手とリアルタイムで対戦できます。先手はランダムに決まります。オンラインではルームを作った側のランダム配布設定が適用されます。</p>
    </div>
    <p style="color:var(--sub);font-size:12px;text-align:center">右上の「？」でいつでもルールと駒一覧を確認できます。</p>
  `,[]);
  const rc=$("#rndChk"); if(rc)rc.checked=randomDeal;
  const syncRnd=()=>{randomDeal=$("#rndChk").checked;};
  $("#lvNormal").onclick=()=>{syncRnd();aiLevel="normal";closeModal();newGame();};
  $("#lvHard").onclick=()=>{syncRnd();aiLevel="hard";closeModal();newGame();};
  $("#lvMax").onclick=()=>{syncRnd();aiLevel="max";closeModal();newGame();};
  $("#btnHost").onclick=()=>{syncRnd();closeModal();hostRoom();};
  $("#btnJoin").onclick=()=>{syncRnd();closeModal();joinRoom();};
}

/* ---------- boot ---------- */
$("#helpBtn").onclick=showHelp;
$("#muteBtn").onclick=()=>{soundOn=!soundOn;$("#muteBtn").textContent=soundOn?"♪":"✕";};
showStart();
</script>
</body>
</html>
